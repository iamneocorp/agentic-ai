<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1250" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowAudit" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#475569"/></marker>
    <marker id="arrowHitl" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#B45309"/></marker>
  </defs>
  <style>
    text { fill:#2E1065; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12.5px; fill:#4B5563; }
    .nt { font-size:13px; font-weight:700; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#6D28D9; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#6D28D9; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .audit { stroke:#475569; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
    .hfeed { stroke:#B45309; stroke-width:1.5; fill:none; stroke-dasharray:6 4; }
  </style>

  <rect x="0" y="0" width="1200" height="1250" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Enterprise API Ecosystem — CrewAI Governance Flow</text>
  <text class="subtitle" x="41" y="64">@start → @listen → @router · 4 pure-LLM agents (sequential) · security gate · HITL review · SQLite audit trail</text>

  <!-- audit store (right) -->
  <g>
    <rect x="915" y="816" width="180" height="58" fill="#F1F5F9" stroke="none"/>
    <line x1="915" y1="816" x2="915" y2="874" stroke="#475569" stroke-width="1.3"/>
    <line x1="1095" y1="816" x2="1095" y2="874" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1005" cy="874" rx="90" ry="12" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1005" cy="816" rx="90" ry="12" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1005" y="842" text-anchor="middle" fill="#334155" font-size="12">SQLite audit trail</text>
    <text class="ns" x="1005" y="858" text-anchor="middle" fill="#334155">data/api_governance.db</text>
  </g>

  <!-- generated artifacts (left) -->
  <rect x="40" y="812" width="188" height="64" rx="10" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.4"/>
  <text class="nt" x="134" y="834" text-anchor="middle" font-size="12">generated outputs</text>
  <text class="ns" x="134" y="850" text-anchor="middle">docs/ · sdks/python/ · tests/</text>
  <text class="ns" x="134" y="865" text-anchor="middle">outputs/&lt;record_id&gt;.json</text>

  <!-- UI -->
  <rect x="290" y="84" width="260" height="40" rx="20" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.4"/>
  <text class="nt" x="420" y="109" text-anchor="middle">Reviewer · Streamlit Console</text>

  <!-- 1 initiate_discovery -->
  <rect x="230" y="140" width="380" height="84" rx="10" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.5"/>
  <text class="nt" x="420" y="164" text-anchor="middle">1 · initiate_discovery</text>
  <text class="ns" x="420" y="181" text-anchor="middle">load_spec() → create_governance_state()</text>
  <text class="ns" x="420" y="197" text-anchor="middle">Discovery agent · spec_loader_tool → catalog · api_count</text>
  <text class="ns" x="420" y="213" text-anchor="middle" fill="#6D28D9">input: OpenAPI spec (dropdown / paste) · 3 samples</text>

  <!-- 2 assess_security -->
  <rect x="230" y="256" width="380" height="84" rx="10" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.5"/>
  <text class="nt" x="420" y="280" text-anchor="middle">2 · assess_security</text>
  <text class="ns" x="420" y="297" text-anchor="middle">Compliance agent (LLM · OWASP)</text>
  <text class="chip" x="420" y="313" text-anchor="middle">tools: security_scanner_tool · contract_validator_tool</text>
  <text class="ns" x="420" y="330" text-anchor="middle" fill="#6D28D9">→ findings · critical_issues · risk_level</text>

  <!-- 3 gate -->
  <rect x="232" y="372" width="376" height="64" rx="10" fill="#FFFFFF" stroke="#6D28D9" stroke-width="2.2"/>
  <text class="nt" x="420" y="396" text-anchor="middle">◆ 3 · route_by_security_level  (@router)</text>
  <text class="ns" x="420" y="414" text-anchor="middle">critical_issues &gt; 0 → security_review</text>
  <text class="ns" x="420" y="430" text-anchor="middle">else → cleared</text>

  <!-- 4a flag_for_review -->
  <rect x="95" y="488" width="250" height="62" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="220" y="510" text-anchor="middle" fill="#92400E" font-size="12">4a · flag_for_review</text>
  <text class="ns" x="220" y="527" text-anchor="middle" fill="#92400E">PENDING_SECURITY_REVIEW</text>
  <text class="ns" x="220" y="541" text-anchor="middle" fill="#92400E">hitl.required = True</text>

  <!-- 4b mark_cleared -->
  <rect x="495" y="488" width="250" height="62" rx="10" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.6"/>
  <text class="nt" x="620" y="510" text-anchor="middle" fill="#166534" font-size="12">4b · mark_cleared</text>
  <text class="ns" x="620" y="530" text-anchor="middle" fill="#166534">CLEARED</text>

  <!-- 5 generate_documentation -->
  <rect x="230" y="602" width="380" height="66" rx="10" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.5"/>
  <text class="nt" x="420" y="626" text-anchor="middle">5 · generate_documentation  (or_ join)</text>
  <text class="ns" x="420" y="643" text-anchor="middle">Documentation agent · documentation_builder_tool</text>
  <text class="ns" x="420" y="659" text-anchor="middle" fill="#6D28D9">→ documentation</text>

  <!-- 6 generate_sdks -->
  <rect x="230" y="700" width="380" height="84" rx="10" fill="#EDE9FE" stroke="#6D28D9" stroke-width="1.5"/>
  <text class="nt" x="420" y="724" text-anchor="middle">6 · generate_sdks</text>
  <text class="ns" x="420" y="741" text-anchor="middle">Developer Experience agent</text>
  <text class="chip" x="420" y="757" text-anchor="middle">tools: sdk_generator_tool · test_generator_tool</text>
  <text class="ns" x="420" y="774" text-anchor="middle" fill="#6D28D9">→ sdks · tests</text>

  <!-- 7 finalize -->
  <rect x="250" y="816" width="340" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="420" y="840" text-anchor="middle" font-size="12">7 · finalize_execution</text>
  <text class="ns" x="420" y="857" text-anchor="middle">finalize_status + record_assessment + save_result</text>

  <!-- HITL band -->
  <rect x="250" y="922" width="700" height="188" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="266" y="944" fill="#B45309">HUMAN-IN-THE-LOOP · Streamlit (human_intervention/) — on PENDING_SECURITY_REVIEW</text>
  <rect x="490" y="960" width="220" height="50" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="600" y="981" text-anchor="middle" font-size="12">Security officer</text>
  <text class="ns" x="600" y="998" text-anchor="middle">approve_publication · reject_publication</text>
  <rect x="430" y="1052" width="180" height="42" rx="21" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.6"/>
  <text class="pill" x="520" y="1078" text-anchor="middle" fill="#166534" font-size="11.5">APPROVED</text>
  <rect x="690" y="1052" width="180" height="42" rx="21" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.6"/>
  <text class="pill" x="780" y="1078" text-anchor="middle" fill="#991B1B" font-size="11.5">REJECTED</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M420 124 V140" marker-end="url(#arrow)"/>
  <rect x="430" y="124" width="180" height="14" fill="#FFFFFF"/>
  <text class="el" x="434" y="135" text-anchor="start">run_api_governance(spec)</text>

  <path class="flow" d="M420 224 V256" marker-end="url(#arrow)"/>
  <path class="flow" d="M420 340 V372" marker-end="url(#arrow)"/>

  <!-- gate to 2 branches -->
  <path class="flow" d="M420 436 V464 H220 V488" marker-end="url(#arrow)"/>
  <rect x="150" y="468" width="140" height="15" fill="#FFFFFF"/>
  <text class="el" x="220" y="480" text-anchor="middle" fill="#B45309">security_review</text>
  <path class="flow" d="M420 436 V464 H620 V488" marker-end="url(#arrow)"/>
  <rect x="580" y="468" width="80" height="15" fill="#FFFFFF"/>
  <text class="el" x="620" y="480" text-anchor="middle" fill="#047857">cleared</text>

  <!-- branches to documentation (or_ join) -->
  <path class="flow" d="M220 550 V576 H420 V602" marker-end="url(#arrow)"/>
  <path class="flow" d="M620 550 V576 H420" />

  <path class="flow" d="M420 668 V700" marker-end="url(#arrow)"/>
  <path class="flow" d="M420 784 V816" marker-end="url(#arrow)"/>

  <!-- finalize to audit db -->
  <path class="audit" d="M590 845 H915" marker-end="url(#arrowAudit)"/>
  <rect x="648" y="829" width="160" height="15" fill="#FFFFFF"/>
  <text class="el" x="728" y="841" text-anchor="middle" fill="#475569">record_assessment (write)</text>

  <!-- finalize to outputs -->
  <path class="audit" d="M250 845 H228" marker-end="url(#arrowAudit)"/>
  <rect x="232" y="792" width="70" height="14" fill="#FFFFFF"/>
  <text class="el" x="238" y="803" text-anchor="start" fill="#475569">save_result</text>

  <!-- finalize to HITL -->
  <path class="hfeed" d="M420 874 V922" marker-end="url(#arrowHitl)"/>
  <rect x="424" y="890" width="186" height="15" fill="#FFFFFF"/>
  <text class="el" x="428" y="902" text-anchor="start" fill="#B45309">if PENDING_SECURITY_REVIEW</text>

  <!-- officer to approve/reject -->
  <path class="flow" d="M560 1010 V1030 H520 V1052" marker-end="url(#arrow)"/>
  <rect x="486" y="1032" width="66" height="15" fill="#FFFBEB"/>
  <text class="el" x="519" y="1044" text-anchor="middle" fill="#047857">approve</text>
  <path class="flow" d="M640 1010 V1030 H780 V1052" marker-end="url(#arrow)"/>
  <rect x="752" y="1032" width="58" height="15" fill="#FFFBEB"/>
  <text class="el" x="781" y="1044" text-anchor="middle" fill="#B91C1C">reject</text>

  <!-- HITL re-record audit -->
  <path class="audit" d="M870 1073 H1005 V888" marker-end="url(#arrowAudit)"/>
  <text class="el" x="1000" y="1030" text-anchor="end" fill="#475569" transform="rotate(-90 1000 1030)">approve/reject upsert the audit row</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1170)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#EDE9FE" stroke="#6D28D9"/>
    <text class="lg" x="22" y="22">LLM agent</text>
    <rect x="110" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="132" y="22">deterministic step</text>
    <rect x="280" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="302" y="22">cleared / approved</text>
    <rect x="430" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="452" y="22">security review / HITL</text>
    <rect x="600" y="9" width="16" height="16" rx="3" fill="#FEF2F2" stroke="#DC2626"/>
    <text class="lg" x="622" y="22">rejected</text>
    <line class="audit" x1="700" y1="18" x2="740" y2="18" marker-end="url(#arrowAudit)"/>
    <text class="lg" x="748" y="22">SQLite audit I/O</text>
  </g>
</svg>
