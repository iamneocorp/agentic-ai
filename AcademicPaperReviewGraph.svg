<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1150" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#1D4ED8"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#1E3A8A; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#1D4ED8; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#1D4ED8; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#1D4ED8; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1150" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Academic Paper Reviewer — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · 5 parallel pure-LLM reviews · weighted decision gate · interrupt() editor HITL · SqliteSaver checkpointer · SQLite review store</text>

  <!-- checkpointer store (right, near HITL) -->
  <g>
    <rect x="1055" y="656" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="656" x2="1055" y2="706" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="656" x2="1225" y2="706" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="706" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="656" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="680" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="695" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>

  <!-- review store (right, near report) -->
  <g>
    <rect x="1055" y="950" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="950" x2="1055" y2="1000" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="950" x2="1225" y2="1000" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1000" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="950" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="974" text-anchor="middle" fill="#334155" font-size="12">SQLite review store</text>
    <text class="ns" x="1140" y="989" text-anchor="middle" fill="#334155">reviews.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="86" width="110" height="36" rx="18" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.4"/>
  <text class="nt" x="590" y="109" text-anchor="middle">START</text>

  <!-- ingest -->
  <rect x="415" y="140" width="350" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="164" text-anchor="middle" font-size="12">ingest</text>
  <text class="ns" x="590" y="182" text-anchor="middle">3 sample PDFs (by title) or upload → extract → paper_content</text>

  <!-- parallel band -->
  <rect x="42" y="230" width="1096" height="176" rx="12" fill="#F5F9FF" stroke="#BFDBFE" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="250">parallel fan-out · add_edge(ingest → 5) · pure-LLM · each node writes its own state key</text>

  <g>
    <rect x="51" y="262" width="206" height="138" rx="10" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <text class="nt" x="154" y="287" text-anchor="middle">methodology</text>
    <text class="ns" x="154" y="304" text-anchor="middle">MethodologyReviewerAgent</text>
    <line x1="71" y1="317" x2="237" y2="317" stroke="#BFDBFE"/>
    <text class="chip" x="154" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="154" y="360" text-anchor="middle" fill="#1D4ED8">→ methodology_results</text>
  </g>
  <g>
    <rect x="269" y="262" width="206" height="138" rx="10" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <text class="nt" x="372" y="287" text-anchor="middle">novelty</text>
    <text class="ns" x="372" y="304" text-anchor="middle">NoveltyAnalyzerAgent</text>
    <line x1="289" y1="317" x2="455" y2="317" stroke="#BFDBFE"/>
    <text class="chip" x="372" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="372" y="360" text-anchor="middle" fill="#1D4ED8">→ novelty_results</text>
  </g>
  <g>
    <rect x="487" y="262" width="206" height="138" rx="10" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <text class="nt" x="590" y="287" text-anchor="middle">citation</text>
    <text class="ns" x="590" y="304" text-anchor="middle">CitationCheckerAgent</text>
    <line x1="507" y1="317" x2="673" y2="317" stroke="#BFDBFE"/>
    <text class="chip" x="590" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="590" y="360" text-anchor="middle" fill="#1D4ED8">→ citation_results</text>
  </g>
  <g>
    <rect x="705" y="262" width="206" height="138" rx="10" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <text class="nt" x="808" y="287" text-anchor="middle" font-size="12">writing_quality</text>
    <text class="ns" x="808" y="304" text-anchor="middle">WritingQualityAgent</text>
    <line x1="725" y1="317" x2="891" y2="317" stroke="#BFDBFE"/>
    <text class="chip" x="808" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="808" y="360" text-anchor="middle" fill="#1D4ED8">→ writing_quality_results</text>
  </g>
  <g>
    <rect x="923" y="262" width="206" height="138" rx="10" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
    <text class="nt" x="1026" y="287" text-anchor="middle" font-size="12">reproducibility</text>
    <text class="ns" x="1026" y="304" text-anchor="middle">ReproducibilityAgent</text>
    <line x1="943" y1="317" x2="1109" y2="317" stroke="#BFDBFE"/>
    <text class="chip" x="1026" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="1026" y="360" text-anchor="middle" fill="#1D4ED8">→ reproducibility_results</text>
  </g>

  <!-- coordinator (fan-in) -->
  <rect x="430" y="442" width="320" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="465" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="590" y="482" text-anchor="middle">weighted average of 5 dimensions → coordination_summary · overall_score</text>

  <!-- decision gate -->
  <rect x="375" y="530" width="430" height="82" rx="10" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="2.2"/>
  <text class="nt" x="590" y="553" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges</text>
  <text class="ns" x="590" y="571" text-anchor="middle">overall ≥ 8.5 · methodology ≥ 7 · novelty ≥ 6 → ACCEPT</text>
  <text class="ns" x="590" y="586" text-anchor="middle">else overall ≥ 7.5 → MINOR_REVISION</text>
  <text class="ns" x="590" y="601" text-anchor="middle">else overall ≥ 6 · methodology ≥ 6 → MAJOR_REVISION · else REJECT</text>

  <!-- editor_review (HITL node) -->
  <rect x="730" y="656" width="230" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="845" y="680" text-anchor="middle" fill="#92400E" font-size="12">editor_review</text>
  <text class="ns" x="845" y="697" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="748" width="475" height="162" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="770" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="786" width="230" height="50" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="765" y="807" text-anchor="middle" fill="#0F172A" font-size="12">Editor decision</text>
  <text class="ns" x="765" y="824" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="797" y="882" text-anchor="middle" fill="#B45309">approve → &lt;DECISION&gt;_confirmed · override → editor_override</text>

  <!-- report -->
  <rect x="420" y="946" width="340" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="970" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="988" text-anchor="middle">fold human_decision → final decision + report · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1044" width="110" height="36" rx="18" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1067" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1066" text-anchor="start" fill="#475569">report.decision · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 122 V140" marker-end="url(#arrow)"/>
  <rect x="600" y="122" width="190" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="133" text-anchor="start">run_paper_review(paper, metadata)</text>

  <!-- fan-out ingest → 5 -->
  <path class="flow" d="M590 198 V216 H154 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H372 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H808 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H1026 V262" marker-end="url(#arrow)"/>

  <!-- fan-in 5 → coordinator -->
  <path class="flow" d="M154 400 V422 H590 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M372 400 V422 H590"/>
  <path class="flow" d="M590 400 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M808 400 V422 H590"/>
  <path class="flow" d="M1026 400 V422 H590"/>
  <rect x="470" y="415" width="240" height="14" fill="#FFFFFF"/>
  <text class="el" x="590" y="426" text-anchor="middle">fan-in: add_edge([5] → coordinator)</text>

  <path class="flow" d="M590 496 V530" marker-end="url(#arrow)"/>

  <!-- decision → report (ACCEPT) -->
  <path class="flow" d="M505 612 V946" marker-end="url(#arrow)"/>
  <rect x="468" y="636" width="74" height="15" fill="#FFFFFF"/>
  <text class="el" x="505" y="648" text-anchor="middle" fill="#047857">ACCEPT</text>

  <!-- decision → editor_review (non-ACCEPT) -->
  <path class="flow" d="M690 612 V634 H845 V656" marker-end="url(#arrow)"/>
  <rect x="698" y="626" width="186" height="15" fill="#FFFFFF"/>
  <text class="el" x="791" y="638" text-anchor="middle" fill="#B45309">route_after_decision → editor_review</text>

  <!-- editor_review → HITL band -->
  <path class="flow" d="M845 714 V748" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 910 V946" marker-end="url(#arrow)"/>
  <rect x="626" y="918" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="930" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1004 V1044" marker-end="url(#arrow)"/>

  <!-- report → review store -->
  <path class="mem" d="M760 975 H1055" marker-end="url(#arrowMem)"/>
  <rect x="836" y="967" width="90" height="15" fill="#FFFFFF"/>
  <text class="el" x="881" y="979" text-anchor="middle" fill="#1D4ED8">save_review</text>

  <!-- editor_review → checkpointer -->
  <path class="mem" d="M960 683 H1055" marker-end="url(#arrowMem)"/>
  <rect x="968" y="675" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1021" y="687" text-anchor="middle" fill="#1D4ED8">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1096)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#EFF6FF" stroke="#1D4ED8"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">editor HITL (interrupt)</text>
    <rect x="520" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="542" y="22">END</text>
    <line class="mem" x1="600" y1="18" x2="640" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="648" y="22">SQLite checkpointer / review store I/O</text>
  </g>
</svg>
