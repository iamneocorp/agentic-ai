<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1150" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0891B2"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#155E75; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#0891B2; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#0891B2; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#0891B2; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1150" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">AI-Powered Code Review Pipeline — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · 5 parallel analyses · quality gate · interrupt() HITL · SqliteSaver checkpointer · SQLite review store</text>

  <!-- checkpointer store (right, near HITL) -->
  <g>
    <rect x="1055" y="656" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="656" x2="1055" y2="706" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="656" x2="1225" y2="706" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="706" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="656" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="680" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="695" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>

  <!-- review store (right, near report) -->
  <g>
    <rect x="1055" y="950" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="950" x2="1055" y2="1000" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="950" x2="1225" y2="1000" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1000" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="950" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="974" text-anchor="middle" fill="#334155" font-size="12">SQLite review store</text>
    <text class="ns" x="1140" y="989" text-anchor="middle" fill="#334155">reviews.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="86" width="110" height="36" rx="18" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.4"/>
  <text class="nt" x="590" y="109" text-anchor="middle">START</text>

  <!-- ingest -->
  <rect x="415" y="140" width="350" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="164" text-anchor="middle" font-size="12">ingest</text>
  <text class="ns" x="590" y="182" text-anchor="middle">local files (paste · upload · sample) or GitHub PR → files</text>

  <!-- parallel band -->
  <rect x="42" y="230" width="1096" height="176" rx="12" fill="#F0FDFF" stroke="#A5E4F0" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="250">parallel fan-out · add_edge(ingest → 5) · each node writes its own state key</text>

  <g>
    <rect x="51" y="262" width="206" height="138" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
    <text class="nt" x="154" y="287" text-anchor="middle">security</text>
    <text class="ns" x="154" y="304" text-anchor="middle">SecurityAgent · LLM</text>
    <line x1="71" y1="317" x2="237" y2="317" stroke="#A5E4F0"/>
    <text class="chip" x="154" y="336" text-anchor="middle">tool: scan_security</text>
    <text class="ns" x="154" y="360" text-anchor="middle" fill="#0891B2">→ security_results</text>
  </g>
  <g>
    <rect x="269" y="262" width="206" height="138" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
    <text class="nt" x="372" y="287" text-anchor="middle">quality</text>
    <text class="ns" x="372" y="304" text-anchor="middle">QualityAgent · LLM</text>
    <line x1="289" y1="317" x2="455" y2="317" stroke="#A5E4F0"/>
    <text class="chip" x="372" y="336" text-anchor="middle">tool: run_pylint</text>
    <text class="ns" x="372" y="360" text-anchor="middle" fill="#0891B2">→ quality_results</text>
  </g>
  <g>
    <rect x="487" y="262" width="206" height="138" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
    <text class="nt" x="590" y="287" text-anchor="middle">coverage</text>
    <text class="ns" x="590" y="304" text-anchor="middle">CoverageAgent · LLM</text>
    <line x1="507" y1="317" x2="673" y2="317" stroke="#A5E4F0"/>
    <text class="chip" x="590" y="336" text-anchor="middle">tool: estimate_coverage</text>
    <text class="ns" x="590" y="360" text-anchor="middle" fill="#0891B2">→ coverage_results</text>
  </g>
  <g>
    <rect x="705" y="262" width="206" height="138" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
    <text class="nt" x="808" y="287" text-anchor="middle">ai_review</text>
    <text class="ns" x="808" y="304" text-anchor="middle">AIReviewAgent · LLM</text>
    <line x1="725" y1="317" x2="891" y2="317" stroke="#A5E4F0"/>
    <text class="chip" x="808" y="336" text-anchor="middle">(no tool · reads code)</text>
    <text class="ns" x="808" y="360" text-anchor="middle" fill="#0891B2">→ ai_reviews</text>
  </g>
  <g>
    <rect x="923" y="262" width="206" height="138" rx="10" fill="#ECFEFF" stroke="#0891B2" stroke-width="1.5"/>
    <text class="nt" x="1026" y="287" text-anchor="middle" font-size="12">documentation</text>
    <text class="ns" x="1026" y="304" text-anchor="middle">DocumentationAgent · LLM</text>
    <line x1="943" y1="317" x2="1109" y2="317" stroke="#A5E4F0"/>
    <text class="chip" x="1026" y="336" text-anchor="middle">tool: measure_documentation</text>
    <text class="ns" x="1026" y="360" text-anchor="middle" fill="#0891B2">→ documentation_results</text>
  </g>

  <!-- coordinator (fan-in) -->
  <rect x="440" y="442" width="300" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="465" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="590" y="482" text-anchor="middle">average 5 dimensions (no LLM) → coordination_summary</text>

  <!-- decision gate -->
  <rect x="375" y="530" width="430" height="82" rx="10" fill="#FFFFFF" stroke="#0891B2" stroke-width="2.2"/>
  <text class="nt" x="590" y="553" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges</text>
  <text class="ns" x="590" y="571" text-anchor="middle">security &lt; 8.0 or HIGH-severity &gt; 0 → critical_escalation</text>
  <text class="ns" x="590" y="586" text-anchor="middle">else quality &lt; 7 · coverage &lt; 80 · ai &lt; 0.8 → human_review</text>
  <text class="ns" x="590" y="601" text-anchor="middle">else documentation &lt; 70 → documentation_review · else auto_approve</text>

  <!-- human_review (HITL node) -->
  <rect x="730" y="656" width="230" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="845" y="680" text-anchor="middle" fill="#92400E" font-size="12">human_review</text>
  <text class="ns" x="845" y="697" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="748" width="475" height="162" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="770" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="786" width="230" height="50" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="765" y="807" text-anchor="middle" fill="#0F172A" font-size="12">Reviewer decision</text>
  <text class="ns" x="765" y="824" text-anchor="middle">approve / reject → human_decision</text>
  <text class="ns" x="797" y="882" text-anchor="middle" fill="#B45309">approve → approved_by_reviewer · reject → rejected_by_reviewer</text>

  <!-- report -->
  <rect x="420" y="946" width="340" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="970" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="988" text-anchor="middle">fold human_decision → final decision + report · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1044" width="110" height="36" rx="18" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1067" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1066" text-anchor="start" fill="#475569">report.decision · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 122 V140" marker-end="url(#arrow)"/>
  <rect x="600" y="122" width="180" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="133" text-anchor="start">run_code_review(files, source)</text>

  <!-- fan-out ingest → 5 -->
  <path class="flow" d="M590 198 V216 H154 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H372 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H808 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H1026 V262" marker-end="url(#arrow)"/>

  <!-- fan-in 5 → coordinator -->
  <path class="flow" d="M154 400 V422 H590 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M372 400 V422 H590"/>
  <path class="flow" d="M590 400 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M808 400 V422 H590"/>
  <path class="flow" d="M1026 400 V422 H590"/>
  <rect x="470" y="415" width="240" height="14" fill="#FFFFFF"/>
  <text class="el" x="590" y="426" text-anchor="middle">fan-in: add_edge([5] → coordinator)</text>

  <path class="flow" d="M590 496 V530" marker-end="url(#arrow)"/>

  <!-- decision → report (auto_approve) -->
  <path class="flow" d="M505 612 V946" marker-end="url(#arrow)"/>
  <rect x="452" y="636" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="505" y="648" text-anchor="middle" fill="#047857">auto_approve</text>

  <!-- decision → human_review (non-auto) -->
  <path class="flow" d="M690 612 V634 H845 V656" marker-end="url(#arrow)"/>
  <rect x="700" y="626" width="182" height="15" fill="#FFFFFF"/>
  <text class="el" x="791" y="638" text-anchor="middle" fill="#B45309">route_after_decision → human_review</text>

  <!-- human_review → HITL band -->
  <path class="flow" d="M845 714 V748" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 910 V946" marker-end="url(#arrow)"/>
  <rect x="626" y="918" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="930" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1004 V1044" marker-end="url(#arrow)"/>

  <!-- report → review store -->
  <path class="mem" d="M760 975 H1055" marker-end="url(#arrowMem)"/>
  <rect x="836" y="967" width="90" height="15" fill="#FFFFFF"/>
  <text class="el" x="881" y="979" text-anchor="middle" fill="#0891B2">save_review</text>

  <!-- human_review → checkpointer -->
  <path class="mem" d="M960 683 H1055" marker-end="url(#arrowMem)"/>
  <rect x="968" y="675" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1021" y="687" text-anchor="middle" fill="#0891B2">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1096)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#ECFEFF" stroke="#0891B2"/>
    <text class="lg" x="22" y="22">LLM agent node</text>
    <rect x="150" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="172" y="22">deterministic node</text>
    <rect x="330" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="352" y="22">HITL (interrupt)</text>
    <rect x="475" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="497" y="22">END</text>
    <line class="mem" x1="560" y1="18" x2="600" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="608" y="22">SQLite checkpointer / review store I/O</text>
  </g>
</svg>
