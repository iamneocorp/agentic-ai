<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1230" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#A21CAF"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#86198F; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#A21CAF; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#A21CAF; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#A21CAF; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1230" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Job Application Screener — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · validate → resume_parser (sequential) → 4 parallel pure-LLM analyses → weighted 3-way gate · interrupt() recruiter HITL · SqliteSaver · SQLite store</text>

  <!-- checkpointer store (right, near HITL) -->
  <g>
    <rect x="1055" y="744" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="744" x2="1055" y2="794" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="744" x2="1225" y2="794" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="794" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="744" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="768" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="783" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>

  <!-- screening store (right, near report) -->
  <g>
    <rect x="1055" y="1038" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="1038" x2="1055" y2="1088" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="1038" x2="1225" y2="1088" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1088" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1038" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="1062" text-anchor="middle" fill="#334155" font-size="12">SQLite screening store</text>
    <text class="ns" x="1140" y="1077" text-anchor="middle" fill="#334155">screenings.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="80" width="110" height="36" rx="18" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.4"/>
  <text class="nt" x="590" y="103" text-anchor="middle">START</text>

  <!-- validate -->
  <rect x="415" y="134" width="350" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="158" text-anchor="middle" font-size="12">validate</text>
  <text class="ns" x="590" y="176" text-anchor="middle">REQUIRED_FIELDS + resume PDF exists → REJECT (skip) if invalid</text>

  <!-- resume_parser (sequential LLM agent) -->
  <rect x="330" y="224" width="520" height="58" rx="10" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.6"/>
  <text class="nt" x="590" y="248" text-anchor="middle" font-size="12">resume_parser · sequential</text>
  <text class="ns" x="590" y="266" text-anchor="middle">ResumeParserAgent · extract PDF text (pypdf) → LLM → parsed_resume</text>

  <!-- parallel band -->
  <rect x="42" y="314" width="1096" height="176" rx="12" fill="#FDF4FF" stroke="#F5D0FE" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="334">parallel fan-out · add_edge(resume_parser → 4) · pure-LLM · each node writes its OWN result key · read parsed_resume + job</text>

  <!-- box 1 skills -->
  <g>
    <rect x="57" y="346" width="244" height="138" rx="10" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.5"/>
    <text class="nt" x="179" y="371" text-anchor="middle" font-size="12">skills</text>
    <text class="ns" x="179" y="389" text-anchor="middle">SkillsMatcherAgent</text>
    <line x1="77" y1="401" x2="281" y2="401" stroke="#F5D0FE"/>
    <text class="chip" x="179" y="421" text-anchor="middle">LLM · match 0–100 %</text>
    <text class="ns" x="179" y="444" text-anchor="middle" fill="#A21CAF">→ skills_results</text>
    <text class="ns" x="179" y="462" text-anchor="middle" fill="#A21CAF">(skills_match)</text>
  </g>
  <!-- box 2 experience -->
  <g>
    <rect x="331" y="346" width="244" height="138" rx="10" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.5"/>
    <text class="nt" x="453" y="371" text-anchor="middle" font-size="12">experience</text>
    <text class="ns" x="453" y="389" text-anchor="middle">ExperienceAnalyzerAgent</text>
    <line x1="351" y1="401" x2="555" y2="401" stroke="#F5D0FE"/>
    <text class="chip" x="453" y="421" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="453" y="444" text-anchor="middle" fill="#A21CAF">→ experience_results</text>
    <text class="ns" x="453" y="462" text-anchor="middle" fill="#A21CAF">(experience_score)</text>
  </g>
  <!-- box 3 culture_fit -->
  <g>
    <rect x="605" y="346" width="244" height="138" rx="10" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.5"/>
    <text class="nt" x="727" y="371" text-anchor="middle" font-size="12">culture_fit</text>
    <text class="ns" x="727" y="389" text-anchor="middle">CultureFitAgent</text>
    <line x1="625" y1="401" x2="829" y2="401" stroke="#F5D0FE"/>
    <text class="chip" x="727" y="421" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="727" y="444" text-anchor="middle" fill="#A21CAF">→ culture_fit_results</text>
    <text class="ns" x="727" y="462" text-anchor="middle" fill="#A21CAF">(culture_fit_score)</text>
  </g>
  <!-- box 4 salary -->
  <g>
    <rect x="879" y="346" width="244" height="138" rx="10" fill="#FDF4FF" stroke="#A21CAF" stroke-width="1.5"/>
    <text class="nt" x="1001" y="371" text-anchor="middle" font-size="12">salary</text>
    <text class="ns" x="1001" y="389" text-anchor="middle">SalaryAgent</text>
    <line x1="899" y1="401" x2="1103" y2="401" stroke="#F5D0FE"/>
    <text class="chip" x="1001" y="421" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="1001" y="444" text-anchor="middle" fill="#A21CAF">→ salary_results</text>
    <text class="ns" x="1001" y="462" text-anchor="middle" fill="#A21CAF">(salary_score)</text>
  </g>

  <!-- coordinator (fan-in) -->
  <rect x="400" y="526" width="380" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="549" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="590" y="566" text-anchor="middle">weighted overall (skills ÷ 10) → coordination_summary · overall_score</text>

  <!-- decision gate (3-way) -->
  <rect x="375" y="614" width="430" height="92" rx="10" fill="#FFFFFF" stroke="#A21CAF" stroke-width="2.2"/>
  <text class="nt" x="590" y="637" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges</text>
  <text class="ns" x="590" y="658" text-anchor="middle">overall ≥ 7.5 · skills ≥ 70 % → INTERVIEW</text>
  <text class="ns" x="590" y="676" text-anchor="middle">else overall ≥ 6.0 → WAITLIST</text>
  <text class="ns" x="590" y="694" text-anchor="middle">else → REJECT</text>

  <!-- agent_review (HITL node) -->
  <rect x="730" y="744" width="230" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="845" y="768" text-anchor="middle" fill="#92400E" font-size="12">agent_review</text>
  <text class="ns" x="845" y="785" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="836" width="475" height="162" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="858" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="874" width="230" height="50" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="765" y="895" text-anchor="middle" fill="#0F172A" font-size="12">Recruiter decision</text>
  <text class="ns" x="765" y="912" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="797" y="970" text-anchor="middle" fill="#B45309">approve → &lt;DECISION&gt;_confirmed · override → reviewer_override</text>

  <!-- report -->
  <rect x="420" y="1034" width="340" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="1057" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="1075" text-anchor="middle">fold human_decision → final decision + LLM interview questions · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1132" width="110" height="36" rx="18" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1155" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1154" text-anchor="start" fill="#475569">report.decision · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 116 V134" marker-end="url(#arrow)"/>
  <rect x="600" y="116" width="150" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="127" text-anchor="start">run_screening(candidate)</text>

  <!-- validate → resume_parser (sequential) -->
  <path class="flow" d="M590 192 V224" marker-end="url(#arrow)"/>
  <rect x="600" y="198" width="66" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="209" text-anchor="start">sequential</text>

  <!-- fan-out resume_parser → 4 -->
  <path class="flow" d="M590 282 V300 H179 V346" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 282 V300 H453 V346" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 282 V300 H727 V346" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 282 V300 H1001 V346" marker-end="url(#arrow)"/>

  <!-- fan-in 4 → coordinator -->
  <path class="flow" d="M179 484 V506 H590 V526" marker-end="url(#arrow)"/>
  <path class="flow" d="M453 484 V506 H590"/>
  <path class="flow" d="M727 484 V506 H590"/>
  <path class="flow" d="M1001 484 V506 H590"/>
  <rect x="470" y="499" width="240" height="14" fill="#FFFFFF"/>
  <text class="el" x="590" y="510" text-anchor="middle">fan-in: add_edge([4] → coordinator)</text>

  <path class="flow" d="M590 580 V614" marker-end="url(#arrow)"/>

  <!-- decision → report (INTERVIEW) -->
  <path class="flow" d="M505 706 V1034" marker-end="url(#arrow)"/>
  <rect x="466" y="724" width="78" height="15" fill="#FFFFFF"/>
  <text class="el" x="505" y="736" text-anchor="middle" fill="#047857">INTERVIEW</text>

  <!-- decision → agent_review (non-INTERVIEW) -->
  <path class="flow" d="M690 706 V726 H845 V744" marker-end="url(#arrow)"/>
  <rect x="694" y="718" width="196" height="15" fill="#FFFFFF"/>
  <text class="el" x="792" y="730" text-anchor="middle" fill="#B45309">route_after_decision → agent_review</text>

  <!-- agent_review → HITL band -->
  <path class="flow" d="M845 802 V836" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 998 V1034" marker-end="url(#arrow)"/>
  <rect x="626" y="1006" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="1018" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1092 V1132" marker-end="url(#arrow)"/>

  <!-- report → screening store -->
  <path class="mem" d="M760 1063 H1055" marker-end="url(#arrowMem)"/>
  <rect x="828" y="1055" width="104" height="15" fill="#FFFFFF"/>
  <text class="el" x="880" y="1067" text-anchor="middle" fill="#A21CAF">save_screening</text>

  <!-- agent_review → checkpointer -->
  <path class="mem" d="M960 773 H1055" marker-end="url(#arrowMem)"/>
  <rect x="968" y="765" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1021" y="777" text-anchor="middle" fill="#A21CAF">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1176)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#FDF4FF" stroke="#A21CAF"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">recruiter HITL (interrupt)</text>
    <rect x="540" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="562" y="22">END</text>
    <line class="mem" x1="620" y1="18" x2="660" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="668" y="22">SQLite checkpointer / screening store I/O</text>
  </g>
</svg>
