<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1300" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0369A1"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#075985; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#0369A1; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#0369A1; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#0369A1; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1300" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Learning Path Recommender — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · validate → Stage 1 (3 parallel) → Stage 2 (2 parallel, depend on all of Stage 1) → weighted quality gate · interrupt() instructor HITL · SqliteSaver</text>

  <!-- checkpointer store -->
  <g>
    <rect x="1055" y="854" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="854" x2="1055" y2="904" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="854" x2="1225" y2="904" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="904" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="854" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="878" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="893" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>
  <!-- path store -->
  <g>
    <rect x="1055" y="1138" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="1138" x2="1055" y2="1188" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="1138" x2="1225" y2="1188" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1188" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1138" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="1162" text-anchor="middle" fill="#334155" font-size="12">SQLite path store</text>
    <text class="ns" x="1140" y="1177" text-anchor="middle" fill="#334155">learning_paths.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="72" width="110" height="34" rx="17" fill="#F0F9FF" stroke="#0369A1" stroke-width="1.4"/>
  <text class="nt" x="590" y="94" text-anchor="middle">START</text>

  <!-- validate -->
  <rect x="415" y="124" width="350" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="146" text-anchor="middle" font-size="12">validate</text>
  <text class="ns" x="590" y="163" text-anchor="middle">REQUIRED_FIELDS on learner → NEEDS_REVIEW (skip) if incomplete</text>

  <!-- Stage 1 band -->
  <rect x="42" y="206" width="1096" height="166" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="226">Stage 1 · parallel fan-out</text>
  <g>
    <rect x="62" y="234" width="320" height="124" rx="10" fill="#F0F9FF" stroke="#0369A1" stroke-width="1.5"/>
    <text class="nt" x="222" y="258" text-anchor="middle" font-size="12">skill_gap</text>
    <text class="ns" x="222" y="275" text-anchor="middle">SkillGapAgent · LLM</text>
    <line x1="82" y1="287" x2="362" y2="287" stroke="#BAE6FD"/>
    <text class="ns" x="222" y="308" text-anchor="middle" fill="#0369A1">→ skill_gap_results</text>
    <text class="ns" x="222" y="326" text-anchor="middle" fill="#0369A1">(total_gap_score · learning_sequence)</text>
    <text class="ns" x="222" y="344" text-anchor="middle" fill="#0369A1">(estimated_total_hours)</text>
  </g>
  <g>
    <rect x="430" y="234" width="320" height="124" rx="10" fill="#F0F9FF" stroke="#0369A1" stroke-width="1.5"/>
    <text class="nt" x="590" y="258" text-anchor="middle" font-size="12">learning_style</text>
    <text class="ns" x="590" y="275" text-anchor="middle">LearningStyleAgent · LLM</text>
    <line x1="450" y1="287" x2="730" y2="287" stroke="#BAE6FD"/>
    <text class="ns" x="590" y="308" text-anchor="middle" fill="#0369A1">→ learning_style_results</text>
    <text class="ns" x="590" y="326" text-anchor="middle" fill="#0369A1">(primary_style ·</text>
    <text class="ns" x="590" y="344" text-anchor="middle" fill="#0369A1">recommendations)</text>
  </g>
  <g>
    <rect x="798" y="234" width="320" height="124" rx="10" fill="#F0F9FF" stroke="#0369A1" stroke-width="1.5"/>
    <text class="nt" x="958" y="258" text-anchor="middle" font-size="12">difficulty</text>
    <text class="ns" x="958" y="275" text-anchor="middle">DifficultyCalibratorAgent · LLM</text>
    <line x1="818" y1="287" x2="1098" y2="287" stroke="#BAE6FD"/>
    <text class="ns" x="958" y="308" text-anchor="middle" fill="#0369A1">→ difficulty_results</text>
    <text class="ns" x="958" y="326" text-anchor="middle" fill="#0369A1">(starting_difficulty ·</text>
    <text class="ns" x="958" y="344" text-anchor="middle" fill="#0369A1">progression_pace)</text>
  </g>

  <!-- Stage 2 band -->
  <rect x="42" y="440" width="1096" height="166" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="460">Stage 2 · parallel · each reads all Stage-1 results</text>
  <g>
    <rect x="220" y="468" width="340" height="124" rx="10" fill="#F0F9FF" stroke="#0369A1" stroke-width="1.5"/>
    <text class="nt" x="390" y="492" text-anchor="middle" font-size="12">resource_curator</text>
    <text class="ns" x="390" y="509" text-anchor="middle">ResourceCuratorAgent · LLM</text>
    <line x1="240" y1="521" x2="540" y2="521" stroke="#BAE6FD"/>
    <text class="chip" x="390" y="540" text-anchor="middle">reads skill_gaps + learning_style</text>
    <text class="ns" x="390" y="561" text-anchor="middle" fill="#0369A1">→ resource_results</text>
    <text class="ns" x="390" y="579" text-anchor="middle" fill="#0369A1">(resources · communities)</text>
  </g>
  <g>
    <rect x="620" y="468" width="340" height="124" rx="10" fill="#F0F9FF" stroke="#0369A1" stroke-width="1.5"/>
    <text class="nt" x="790" y="492" text-anchor="middle" font-size="12">progress_tracker</text>
    <text class="ns" x="790" y="509" text-anchor="middle">ProgressTrackerAgent · LLM</text>
    <line x1="640" y1="521" x2="940" y2="521" stroke="#BAE6FD"/>
    <text class="chip" x="790" y="540" text-anchor="middle">reads skill_gaps + difficulty</text>
    <text class="ns" x="790" y="561" text-anchor="middle" fill="#0369A1">→ progress_results</text>
    <text class="ns" x="790" y="579" text-anchor="middle" fill="#0369A1">(milestones · schedule)</text>
  </g>

  <!-- coordinator -->
  <rect x="400" y="644" width="380" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="666" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="590" y="683" text-anchor="middle">assemble curriculum → path_quality_score · success_probability</text>

  <!-- decision gate (binary) -->
  <rect x="375" y="736" width="430" height="78" rx="10" fill="#FFFFFF" stroke="#0369A1" stroke-width="2.2"/>
  <text class="nt" x="590" y="759" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges</text>
  <text class="ns" x="590" y="781" text-anchor="middle">path_quality_score ≥ 7.0 → RECOMMENDED</text>
  <text class="ns" x="590" y="799" text-anchor="middle">else → NEEDS_REVIEW</text>

  <!-- agent_review (HITL node) -->
  <rect x="730" y="852" width="230" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="845" y="875" text-anchor="middle" fill="#92400E" font-size="12">agent_review</text>
  <text class="ns" x="845" y="892" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="942" width="475" height="158" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="964" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="980" width="230" height="48" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="765" y="1000" text-anchor="middle" fill="#0F172A" font-size="12">Instructor decision</text>
  <text class="ns" x="765" y="1016" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="797" y="1072" text-anchor="middle" fill="#B45309">approve → &lt;DECISION&gt;_confirmed · override → instructor_revised</text>

  <!-- report -->
  <rect x="420" y="1136" width="340" height="56" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="1159" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="1176" text-anchor="middle">fold human_decision → final decision + report · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1230" width="110" height="34" rx="17" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1252" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1251" text-anchor="start" fill="#475569">report.decision · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 106 V124" marker-end="url(#arrow)"/>
  <rect x="600" y="106" width="176" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="117" text-anchor="start">run_recommendation(learner)</text>

  <!-- fan-out validate → 3 Stage-1 -->
  <path class="flow" d="M590 178 V196 H222 V234" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 178 V234" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 178 V196 H958 V234" marker-end="url(#arrow)"/>

  <!-- Stage 1 -> join bus -> Stage 2 (each Stage-2 depends on ALL Stage-1) -->
  <path class="flow" d="M222 358 V400"/>
  <path class="flow" d="M590 358 V400"/>
  <path class="flow" d="M958 358 V400"/>
  <path class="flow" d="M222 400 H958"/>
  <rect x="360" y="392" width="460" height="15" fill="#F0F9FF"/>
  <text class="el" x="590" y="404" text-anchor="middle" fill="#0369A1">each Stage-2 depends on ALL of Stage-1 · add_edge(STAGE1_NODES, node)</text>
  <path class="flow" d="M390 400 V468" marker-end="url(#arrow)"/>
  <path class="flow" d="M790 400 V468" marker-end="url(#arrow)"/>

  <!-- Stage 2 -> coordinator (fan-in) -->
  <path class="flow" d="M390 592 V620 H590 V644" marker-end="url(#arrow)"/>
  <path class="flow" d="M790 592 V620 H590"/>
  <rect x="470" y="613" width="240" height="14" fill="#FFFFFF"/>
  <text class="el" x="590" y="624" text-anchor="middle">fan-in: add_edge(STAGE2_NODES → coordinator)</text>

  <path class="flow" d="M590 698 V736" marker-end="url(#arrow)"/>

  <!-- decision → report (RECOMMENDED) -->
  <path class="flow" d="M505 814 V1136" marker-end="url(#arrow)"/>
  <rect x="450" y="832" width="110" height="15" fill="#FFFFFF"/>
  <text class="el" x="505" y="844" text-anchor="middle" fill="#047857">RECOMMENDED</text>

  <!-- decision → agent_review (NEEDS_REVIEW) -->
  <path class="flow" d="M690 814 V834 H845 V852" marker-end="url(#arrow)"/>
  <rect x="694" y="826" width="196" height="15" fill="#FFFFFF"/>
  <text class="el" x="792" y="838" text-anchor="middle" fill="#B45309">route_after_decision → agent_review</text>

  <!-- agent_review → HITL band -->
  <path class="flow" d="M845 908 V942" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 1100 V1136" marker-end="url(#arrow)"/>
  <rect x="626" y="1108" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="1120" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1192 V1230" marker-end="url(#arrow)"/>

  <!-- report → path store -->
  <path class="mem" d="M760 1164 H1055" marker-end="url(#arrowMem)"/>
  <rect x="838" y="1156" width="84" height="15" fill="#FFFFFF"/>
  <text class="el" x="880" y="1168" text-anchor="middle" fill="#0369A1">save_path</text>

  <!-- agent_review → checkpointer -->
  <path class="mem" d="M960 879 H1055" marker-end="url(#arrowMem)"/>
  <rect x="968" y="871" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1021" y="883" text-anchor="middle" fill="#0369A1">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1250)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#F0F9FF" stroke="#0369A1"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">instructor HITL (interrupt)</text>
    <rect x="545" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="567" y="22">END</text>
    <line class="mem" x1="625" y1="18" x2="665" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="673" y="22">SQLite checkpointer / path store I/O</text>
  </g>
</svg>
