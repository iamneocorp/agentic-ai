<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1380" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#B91C1C"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#7F1D1D; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#B91C1C; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#B91C1C; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#B91C1C; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1380" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Medical Diagnosis Pipeline — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · validate → Stage 1 (4 parallel) → specialist_review (Stage 2, consumes all four) → 6-rung ladder + priority · interrupt() clinician HITL · SqliteSaver</text>

  <!-- checkpointer store -->
  <g>
    <rect x="1055" y="894" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="894" x2="1055" y2="944" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="894" x2="1225" y2="944" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="944" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="894" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="918" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="933" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>
  <!-- diagnosis store -->
  <g>
    <rect x="1055" y="1188" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="1188" x2="1055" y2="1238" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="1188" x2="1225" y2="1238" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1238" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1188" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="1212" text-anchor="middle" fill="#334155" font-size="12">SQLite diagnosis store</text>
    <text class="ns" x="1140" y="1227" text-anchor="middle" fill="#334155">diagnoses.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="72" width="110" height="34" rx="17" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.4"/>
  <text class="nt" x="590" y="94" text-anchor="middle">START</text>

  <!-- validate -->
  <rect x="360" y="124" width="460" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="146" text-anchor="middle" font-size="12">validate</text>
  <text class="ns" x="590" y="165" text-anchor="middle">REQUIRED_FIELDS on patient → IMMEDIATE_INTERVENTION (escalate) if incomplete</text>

  <!-- Stage 1 band -->
  <rect x="42" y="210" width="1096" height="180" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="230">Stage 1 · parallel</text>
  <g>
    <rect x="57" y="242" width="244" height="130" rx="10" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.5"/>
    <text class="nt" x="179" y="266" text-anchor="middle" font-size="12">symptom_analysis</text>
    <text class="ns" x="179" y="283" text-anchor="middle">SymptomAgent</text>
    <line x1="77" y1="295" x2="281" y2="295" stroke="#FECACA"/>
    <text class="chip" x="179" y="314" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="179" y="336" text-anchor="middle" fill="#B91C1C">→ symptom_results</text>
    <text class="ns" x="179" y="354" text-anchor="middle" fill="#B91C1C">(severity_score · red_flags)</text>
  </g>
  <g>
    <rect x="331" y="242" width="244" height="130" rx="10" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.5"/>
    <text class="nt" x="453" y="266" text-anchor="middle" font-size="12">lab_analysis</text>
    <text class="ns" x="453" y="283" text-anchor="middle">LabAgent</text>
    <line x1="351" y1="295" x2="555" y2="295" stroke="#FECACA"/>
    <text class="chip" x="453" y="314" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="453" y="336" text-anchor="middle" fill="#B91C1C">→ lab_results</text>
    <text class="ns" x="453" y="354" text-anchor="middle" fill="#B91C1C">(abnormality_score · critical_findings)</text>
  </g>
  <g>
    <rect x="605" y="242" width="244" height="130" rx="10" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.5"/>
    <text class="nt" x="727" y="266" text-anchor="middle" font-size="12">history_analysis</text>
    <text class="ns" x="727" y="283" text-anchor="middle">MedicalHistoryAgent</text>
    <line x1="625" y1="295" x2="829" y2="295" stroke="#FECACA"/>
    <text class="chip" x="727" y="314" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="727" y="336" text-anchor="middle" fill="#B91C1C">→ history_results</text>
    <text class="ns" x="727" y="354" text-anchor="middle" fill="#B91C1C">(risk_score · risk_level)</text>
  </g>
  <g>
    <rect x="879" y="242" width="244" height="130" rx="10" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.5"/>
    <text class="nt" x="1001" y="266" text-anchor="middle" font-size="12">interaction_analysis</text>
    <text class="ns" x="1001" y="283" text-anchor="middle">DrugInteractionAgent</text>
    <line x1="899" y1="295" x2="1103" y2="295" stroke="#FECACA"/>
    <text class="chip" x="1001" y="314" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="1001" y="336" text-anchor="middle" fill="#B91C1C">→ interaction_results</text>
    <text class="ns" x="1001" y="354" text-anchor="middle" fill="#B91C1C">(interaction_score · warnings)</text>
  </g>

  <!-- specialist_review (Stage 2, single node consuming all four) -->
  <rect x="310" y="446" width="560" height="76" rx="10" fill="#FEF2F2" stroke="#B91C1C" stroke-width="1.8"/>
  <text class="nt" x="590" y="470" text-anchor="middle" font-size="12">specialist_review · Stage 2</text>
  <text class="ns" x="590" y="488" text-anchor="middle">SpecialistAgent.analyze(patient, symptom, lab, history, drugs)</text>
  <text class="ns" x="590" y="508" text-anchor="middle" fill="#B91C1C">→ specialist_results (assessment_score · urgency · confidence · specialists)</text>

  <!-- coordinator -->
  <rect x="330" y="556" width="520" height="88" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="578" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="590" y="597" text-anchor="middle">weighted 0.30·symptom + 0.25·lab + 0.20·history + 0.10·interaction + 0.15·specialist</text>
  <text class="ns" x="590" y="615" text-anchor="middle">critical_flags = count(critical_findings) + requires_immediate_attention</text>
  <text class="chip" x="590" y="635" text-anchor="middle">→ overall_severity · critical_flags · coordination_summary</text>

  <!-- decision gate (ordered 6-rung ladder) -->
  <rect x="270" y="678" width="640" height="176" rx="10" fill="#FFFFFF" stroke="#B91C1C" stroke-width="2.2"/>
  <text class="nt" x="590" y="702" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges · ordered ladder — most urgent rung wins</text>
  <text class="ns" x="590" y="724" text-anchor="middle">critical_flags &gt; 0 or overall_severity ≥ 8.0 → IMMEDIATE_INTERVENTION</text>
  <text class="ns" x="590" y="742" text-anchor="middle">else symptom ≥ 7.0 or lab ≥ 7.0 → URGENT_SPECIALIST_REFERRAL</text>
  <text class="ns" x="590" y="760" text-anchor="middle">else interaction ≥ 5.0 → PHARMACIST_REVIEW</text>
  <text class="ns" x="590" y="778" text-anchor="middle">else specialist ≥ 8.0 → SPECIALIST_CONSULTATION</text>
  <text class="ns" x="590" y="796" text-anchor="middle">else overall_severity ≥ 4.0 → FOLLOW_UP_CARE</text>
  <text class="ns" x="590" y="814" text-anchor="middle">else → ROUTINE_CARE</text>
  <text class="chip" x="590" y="836" text-anchor="middle">+ priority (PRIORITY map) · decision_metrics</text>

  <!-- clinician_review (HITL node) -->
  <rect x="740" y="894" width="230" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="855" y="918" text-anchor="middle" fill="#92400E" font-size="12">clinician_review</text>
  <text class="ns" x="855" y="935" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="986" width="478" height="158" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="1008" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="1024" width="240" height="48" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="770" y="1044" text-anchor="middle" fill="#0F172A" font-size="12">Clinician decision</text>
  <text class="ns" x="770" y="1060" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="799" y="1116" text-anchor="middle" fill="#B45309">approve → &lt;DECISION&gt;_confirmed · override → clinician_overridden</text>

  <!-- report -->
  <rect x="390" y="1182" width="400" height="62" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="1206" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="1225" text-anchor="middle">fold human_decision · always carries DISCLAIMER · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1282" width="110" height="34" rx="17" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1304" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1303" text-anchor="start" fill="#475569">report.decision · priority · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 106 V124" marker-end="url(#arrow)"/>
  <rect x="600" y="106" width="160" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="117" text-anchor="start">run_diagnosis(patient)</text>

  <!-- fan-out validate → 4 Stage-1 -->
  <path class="flow" d="M590 182 V202 H179 V242" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 182 V202 H453 V242" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 182 V202 H727 V242" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 182 V202 H1001 V242" marker-end="url(#arrow)"/>

  <!-- Stage 1 → specialist_review (fan-in: waits for ALL four) -->
  <path class="flow" d="M179 372 V408"/>
  <path class="flow" d="M453 372 V408"/>
  <path class="flow" d="M727 372 V408"/>
  <path class="flow" d="M1001 372 V408"/>
  <path class="flow" d="M179 408 H1001"/>
  <path class="flow" d="M590 408 V446" marker-end="url(#arrow)"/>
  <rect x="611" y="418" width="404" height="15" fill="#FFFFFF"/>
  <text class="el" x="615" y="430" text-anchor="start" fill="#B91C1C">fan-in: add_edge(STAGE1_NODES → specialist_review) · waits for ALL four</text>
  <rect x="46" y="418" width="352" height="15" fill="#FFFFFF"/>
  <text class="el" x="50" y="430" text-anchor="start" fill="#B91C1C">patient["lab_results"] = raw labs · lab_results = the ANALYSIS</text>

  <path class="flow" d="M590 522 V556" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 644 V678" marker-end="url(#arrow)"/>

  <!-- decision → report (ROUTINE_CARE only) -->
  <path class="flow" d="M430 854 V1182" marker-end="url(#arrow)"/>
  <rect x="379" y="872" width="102" height="15" fill="#FFFFFF"/>
  <text class="el" x="430" y="884" text-anchor="middle" fill="#047857">ROUTINE_CARE</text>

  <!-- decision → clinician_review (every escalation) -->
  <path class="flow" d="M760 854 V874 H855 V894" marker-end="url(#arrow)"/>
  <rect x="770" y="866" width="212" height="15" fill="#FFFFFF"/>
  <text class="el" x="876" y="878" text-anchor="middle" fill="#B45309">route_after_decision → clinician_review</text>

  <!-- clinician_review → HITL band -->
  <path class="flow" d="M855 952 V986" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 1144 V1182" marker-end="url(#arrow)"/>
  <rect x="626" y="1152" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="1164" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1244 V1282" marker-end="url(#arrow)"/>

  <!-- report → diagnosis store -->
  <path class="mem" d="M790 1213 H1055" marker-end="url(#arrowMem)"/>
  <rect x="855" y="1205" width="112" height="15" fill="#FFFFFF"/>
  <text class="el" x="911" y="1217" text-anchor="middle" fill="#B91C1C">save_diagnosis</text>

  <!-- clinician_review → checkpointer -->
  <path class="mem" d="M970 921 H1055" marker-end="url(#arrowMem)"/>
  <rect x="978" y="913" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1031" y="925" text-anchor="middle" fill="#B91C1C">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1332)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#FEF2F2" stroke="#B91C1C"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">clinician HITL (interrupt)</text>
    <rect x="545" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="567" y="22">END</text>
    <line class="mem" x1="625" y1="18" x2="665" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="673" y="22">SQLite checkpointer / diagnosis store I/O</text>
  </g>
</svg>
