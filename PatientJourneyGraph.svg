<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 1120" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#94A3B8"/></marker>
    <marker id="arrowT" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0D9488"/></marker>
    <marker id="arrowH" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#D97706"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0D9488"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:12.5px; font-weight:700; fill:#0D9488; }
    .ns { font-size:10.5px; fill:#475569; }
    .el { font-size:10px; fill:#0D9488; font-weight:600; }
    .eh { font-size:10px; fill:#B45309; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .lg { font-size:11px; fill:#334155; }
    .cal { font-size:9.5px; fill:#0F766E; }
    .flow { stroke:#94A3B8; stroke-width:1.6; fill:none; }
    .gate { stroke:#2DD4BF; stroke-width:1.8; fill:none; }
    .hit  { stroke:#F59E0B; stroke-width:1.8; fill:none; }
    .mem  { stroke:#2DD4BF; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>
  <rect x="0" y="0" width="1180" height="1120" fill="#FFFFFF"/>
  <text class="title" x="40" y="40">Healthcare Patient Journey Optimizer — CrewAI Flow</text>
  <text class="subtitle" x="41" y="62">Flow · @start → @router GATE 1 (data quality) → or_ → @router GATE 2 (compliance, HITL) → or_ → finalize · 4 pure-LLM agents · 8 tools · SQLite audit trail</text>
  <rect x="505" y="52" width="110" height="34" rx="17" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.4"/>
  <text class="pill" x="560" y="74" text-anchor="middle" fill="#0D9488">START</text>
  <rect x="505" y="952" width="110" height="34" rx="17" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.8"/>
  <text class="pill" x="560" y="974" text-anchor="middle" fill="#166534">END</text>
  <rect x="300" y="100" width="520" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
  <text class="nt" x="560.0" y="119" text-anchor="middle" fill="#0D9488">initiate_data_aggregation</text>
  <text class="ns" x="560.0" y="136" text-anchor="middle" fill="#475569">@start · PatientDataAgent · tools: EHR Integration + Patient Data Parser</text>
  <text class="ns" x="560.0" y="151" text-anchor="middle" fill="#475569">aggregate the chart and judge data_quality_score (0–100)</text>
  <text class="ns" x="560.0" y="166" text-anchor="middle" fill="#0D9488">→ patient_data · data_quality_score</text>
  <rect x="330" y="204" width="460" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
  <text class="nt" x="560.0" y="223" text-anchor="middle" fill="#0D9488">route_by_data_quality</text>
  <text class="ns" x="560.0" y="240" text-anchor="middle" fill="#475569">@router — GATE 1</text>
  <text class="ns" x="560.0" y="255" text-anchor="middle" fill="#475569">data_quality_score ≥ data_quality_floor (60) ?</text>
  <rect x="112" y="298" width="404" height="90" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
  <text class="nt" x="314.0" y="317" text-anchor="middle" fill="#0D9488">analyze_clinical_pathway</text>
  <text class="ns" x="314.0" y="334" text-anchor="middle" fill="#475569">@listen(sufficient) · ClinicalPathwayAgent</text>
  <text class="ns" x="314.0" y="349" text-anchor="middle" fill="#475569">tools: Clinical Protocol Analyzer + Treatment Pathway Mapper</text>
  <text class="ns" x="314.0" y="364" text-anchor="middle" fill="#0D9488">→ clinical_pathway · pathway_evaluated = True</text>
  <rect x="604" y="298" width="404" height="90" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="806.0" y="317" text-anchor="middle" fill="#334155">skip_clinical_pathway</text>
  <text class="ns" x="806.0" y="334" text-anchor="middle" fill="#475569">@listen(insufficient)</text>
  <text class="ns" x="806.0" y="349" text-anchor="middle" fill="#475569">data below the floor — skip and record why</text>
  <text class="ns" x="806.0" y="364" text-anchor="middle" fill="#0D9488">→ pathway_evaluated = False</text>
  <rect x="300" y="414" width="520" height="82" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
  <text class="nt" x="560.0" y="433" text-anchor="middle" fill="#0D9488">check_compliance</text>
  <text class="ns" x="560.0" y="450" text-anchor="middle" fill="#475569">@listen(or_(...)) · ComplianceAgent · tools: HIPAA Checker + Privacy Auditor</text>
  <text class="ns" x="560.0" y="465" text-anchor="middle" fill="#475569">audit the journey's HIPAA compliance</text>
  <text class="ns" x="560.0" y="480" text-anchor="middle" fill="#0D9488">→ critical_issues · privacy_risk_level</text>
  <rect x="330" y="520" width="460" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
  <text class="nt" x="560.0" y="539" text-anchor="middle" fill="#0D9488">route_by_compliance</text>
  <text class="ns" x="560.0" y="556" text-anchor="middle" fill="#475569">@router — GATE 2</text>
  <text class="ns" x="560.0" y="571" text-anchor="middle" fill="#475569">critical_issues &gt; 0 ?</text>
  <rect x="112" y="616" width="404" height="74" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="314.0" y="635" text-anchor="middle" fill="#334155">mark_compliant</text>
  <text class="ns" x="314.0" y="652" text-anchor="middle" fill="#475569">@listen(cleared)</text>
  <text class="ns" x="314.0" y="667" text-anchor="middle" fill="#475569">no critical issues</text>
  <text class="ns" x="314.0" y="682" text-anchor="middle" fill="#0D9488">→ status = CLEARED</text>
  <rect x="604" y="616" width="404" height="90" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.8"/>
  <text class="nt" x="806.0" y="635" text-anchor="middle" fill="#92400E">flag_for_compliance_review</text>
  <text class="ns" x="806.0" y="652" text-anchor="middle" fill="#B45309">@listen(compliance_review) · HITL</text>
  <text class="ns" x="806.0" y="667" text-anchor="middle" fill="#B45309">hold for a compliance officer</text>
  <text class="ns" x="806.0" y="682" text-anchor="middle" fill="#0D9488">→ PENDING_COMPLIANCE_REVIEW · hitl.required = True</text>
  <rect x="300" y="732" width="520" height="82" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
  <text class="nt" x="560.0" y="751" text-anchor="middle" fill="#0D9488">optimize_patient_experience</text>
  <text class="ns" x="560.0" y="768" text-anchor="middle" fill="#475569">@listen(or_(...)) · PatientExperienceAgent</text>
  <text class="ns" x="560.0" y="783" text-anchor="middle" fill="#475569">tools: Patient Feedback Analyzer + Journey Report Generator</text>
  <text class="ns" x="560.0" y="798" text-anchor="middle" fill="#0D9488">→ patient_experience · final_report</text>
  <rect x="300" y="838" width="520" height="72" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="560.0" y="857" text-anchor="middle" fill="#334155">finalize_journey_optimization</text>
  <text class="ns" x="560.0" y="874" text-anchor="middle" fill="#475569">@listen(optimize_patient_experience)</text>
  <text class="ns" x="560.0" y="889" text-anchor="middle" fill="#475569">stamp timing · persist to the audit trail (record_journey)</text>
  <text class="ns" x="560.0" y="904" text-anchor="middle" fill="#0D9488">→ resolved_at · duration_seconds</text>
  <path class="flow" d="M560 86 V96" marker-end="url(#arrow)"/>
  <text class="el" x="572" y="93">run_journey(patient_case)</text>
  <path class="flow" d="M560 180 V200" marker-end="url(#arrow)"/>
  <path class="gate" d="M560 266 V282 H314.0 V294" marker-end="url(#arrowT)"/>
  <path class="gate" d="M560 266 V282 H806.0 V294" marker-end="url(#arrowT)"/>
  <text class="el" x="252" y="275" text-anchor="end">sufficient (≥ floor)</text>
  <text class="el" x="872" y="275">insufficient</text>
  <path class="flow" d="M314.0 388 V400 H520 V410" marker-end="url(#arrow)"/>
  <path class="flow" d="M806.0 388 V400 H600 V410" marker-end="url(#arrow)"/>
  <text class="el" x="150" y="406">or_( analyze , skip )</text>
  <path class="flow" d="M560 496 V516" marker-end="url(#arrow)"/>
  <path class="gate" d="M560 582 V598 H314.0 V612" marker-end="url(#arrowT)"/>
  <path class="hit" d="M560 582 V598 H806.0 V612" marker-end="url(#arrowH)"/>
  <text class="el" x="252" y="591" text-anchor="end">cleared (0 critical)</text>
  <text class="eh" x="872" y="591">compliance_review (&gt; 0)</text>
  <path class="flow" d="M314.0 690 V720 H520 V728" marker-end="url(#arrow)"/>
  <path class="flow" d="M806.0 706 V720 H600 V728" marker-end="url(#arrow)"/>
  <text class="el" x="150" y="726">or_( flag , mark )</text>
  <path class="flow" d="M560 814 V834" marker-end="url(#arrow)"/>
  <path class="flow" d="M560 910 V948" marker-end="url(#arrow)"/>
  <text class="cal" x="1016" y="650">compliance officer →</text>
  <text class="cal" x="1016" y="664">approve = APPROVED</text>
  <text class="cal" x="1016" y="678">reject = REJECTED</text>
  <text class="cal" x="1016" y="692">(approval_manager)</text>
  <g><rect x="920" y="860" width="180" height="44" fill="#F1F5F9" stroke="none"/><line x1="920" y1="860" x2="920" y2="904" stroke="#475569" stroke-width="1.3"/><line x1="1100" y1="860" x2="1100" y2="904" stroke="#475569" stroke-width="1.3"/><ellipse cx="1010" cy="904" rx="90" ry="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/><ellipse cx="1010" cy="860" rx="90" ry="10" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/><text class="nt" x="1010" y="882" text-anchor="middle" fill="#334155">Audit trail</text><text class="ns" x="1010" y="897" text-anchor="middle" fill="#334155">patient_journeys.db</text></g>
  <path class="mem" d="M910 0" fill="none"/>
  <path class="mem" d="M820 874 H1010 V858" marker-end="url(#arrowMem)"/>
  <text class="cal" x="828" y="868">record_journey</text>
  <g transform="translate(40,1078)">
    <rect x="0" y="0" width="18" height="12" rx="3" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
    <text class="lg" x="26" y="10">agent step (pure LLM)</text>
    <rect x="190" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
    <text class="lg" x="216" y="10">plain @listen step</text>
    <rect x="360" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
    <text class="lg" x="386" y="10">@router gate</text>
    <rect x="500" y="0" width="18" height="12" rx="3" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.8"/>
    <text class="lg" x="526" y="10">HITL compliance hold</text>
    <line x1="700" y1="6" x2="736" y2="6" stroke="#2DD4BF" stroke-width="1.8"/>
    <text class="lg" x="744" y="10">router branch</text>
    <line x1="870" y1="6" x2="906" y2="6" stroke="#2DD4BF" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text class="lg" x="914" y="10">persistence</text>
  </g>
</svg>