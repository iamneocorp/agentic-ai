<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1170" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#BE123C"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#9F1239; }
    .ns { font-size:10.5px; fill:#475569; }
    .cls { font-size:9.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#BE123C; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#BE123C; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#BE123C; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1170" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">E-commerce Product Quality Checker — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · validate → 6 parallel pure-LLM agents · one quality_results reducer · weighted 3-way gate · interrupt() reviewer HITL · SqliteSaver · SQLite quality store</text>

  <!-- checkpointer store (right, near HITL) -->
  <g>
    <rect x="1055" y="662" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="662" x2="1055" y2="712" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="662" x2="1225" y2="712" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="712" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="662" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="686" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="701" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>

  <!-- quality store (right, near report) -->
  <g>
    <rect x="1055" y="956" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="956" x2="1055" y2="1006" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="956" x2="1225" y2="1006" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1006" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="956" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="980" text-anchor="middle" fill="#334155" font-size="12">SQLite quality store</text>
    <text class="ns" x="1140" y="995" text-anchor="middle" fill="#334155">quality_checks.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="86" width="110" height="36" rx="18" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.4"/>
  <text class="nt" x="590" y="109" text-anchor="middle">START</text>

  <!-- validate -->
  <rect x="415" y="140" width="350" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="164" text-anchor="middle" font-size="12">validate</text>
  <text class="ns" x="590" y="182" text-anchor="middle">REQUIRED_FIELDS + positive price → reject (skip agents) if invalid</text>

  <!-- parallel band -->
  <rect x="42" y="230" width="1096" height="176" rx="12" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="250">parallel fan-out · add_edge(validate → 6) · pure-LLM · all six APPEND to one quality_results (operator.add), tagged by agent_name</text>

  <!-- box 1 category -->
  <g>
    <rect x="52" y="262" width="170" height="138" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.5"/>
    <text class="nt" x="137" y="287" text-anchor="middle" font-size="12">category</text>
    <text class="cls" x="137" y="303" text-anchor="middle">CategoryClassifierAgent</text>
    <line x1="68" y1="315" x2="206" y2="315" stroke="#FECDD3"/>
    <text class="chip" x="137" y="334" text-anchor="middle">LLM · scores 0–100</text>
    <text class="cls" x="137" y="356" text-anchor="middle" fill="#BE123C">→ quality_results</text>
    <text class="cls" x="137" y="374" text-anchor="middle" fill="#BE123C">(agent_name · status)</text>
  </g>
  <!-- box 2 compliance -->
  <g>
    <rect x="233" y="262" width="170" height="138" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.5"/>
    <text class="nt" x="318" y="287" text-anchor="middle" font-size="12">compliance</text>
    <text class="cls" x="318" y="303" text-anchor="middle">ComplianceCheckerAgent</text>
    <line x1="249" y1="315" x2="387" y2="315" stroke="#FECDD3"/>
    <text class="chip" x="318" y="334" text-anchor="middle">LLM · scores 0–100</text>
    <text class="cls" x="318" y="356" text-anchor="middle" fill="#BE123C">→ quality_results</text>
    <text class="cls" x="318" y="374" text-anchor="middle" fill="#BE123C">(failed → critical)</text>
  </g>
  <!-- box 3 description -->
  <g>
    <rect x="414" y="262" width="170" height="138" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.5"/>
    <text class="nt" x="499" y="287" text-anchor="middle" font-size="12">description</text>
    <text class="cls" x="499" y="303" text-anchor="middle">DescriptionQualityAgent</text>
    <line x1="430" y1="315" x2="568" y2="315" stroke="#FECDD3"/>
    <text class="chip" x="499" y="334" text-anchor="middle">LLM · scores 0–100</text>
    <text class="cls" x="499" y="356" text-anchor="middle" fill="#BE123C">→ quality_results</text>
    <text class="cls" x="499" y="374" text-anchor="middle" fill="#BE123C">(agent_name · status)</text>
  </g>
  <!-- box 4 image -->
  <g>
    <rect x="595" y="262" width="170" height="138" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.5"/>
    <text class="nt" x="680" y="287" text-anchor="middle" font-size="12">image</text>
    <text class="cls" x="680" y="303" text-anchor="middle">ImageQualityAgent</text>
    <line x1="611" y1="315" x2="749" y2="315" stroke="#FECDD3"/>
    <text class="chip" x="680" y="334" text-anchor="middle">LLM · scores 0–100</text>
    <text class="cls" x="680" y="356" text-anchor="middle" fill="#BE123C">→ quality_results</text>
    <text class="cls" x="680" y="374" text-anchor="middle" fill="#BE123C">(agent_name · status)</text>
  </g>
  <!-- box 5 pricing -->
  <g>
    <rect x="776" y="262" width="170" height="138" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.5"/>
    <text class="nt" x="861" y="287" text-anchor="middle" font-size="12">pricing</text>
    <text class="cls" x="861" y="303" text-anchor="middle">PricingValidatorAgent</text>
    <line x1="792" y1="315" x2="930" y2="315" stroke="#FECDD3"/>
    <text class="chip" x="861" y="334" text-anchor="middle">LLM · scores 0–100</text>
    <text class="cls" x="861" y="356" text-anchor="middle" fill="#BE123C">→ quality_results</text>
    <text class="cls" x="861" y="374" text-anchor="middle" fill="#BE123C">(agent_name · status)</text>
  </g>
  <!-- box 6 sentiment -->
  <g>
    <rect x="957" y="262" width="170" height="138" rx="10" fill="#FFF1F2" stroke="#BE123C" stroke-width="1.5"/>
    <text class="nt" x="1042" y="287" text-anchor="middle" font-size="12">sentiment</text>
    <text class="cls" x="1042" y="303" text-anchor="middle">SentimentAnalyzerAgent</text>
    <line x1="973" y1="315" x2="1111" y2="315" stroke="#FECDD3"/>
    <text class="chip" x="1042" y="334" text-anchor="middle">LLM · scores 0–100</text>
    <text class="cls" x="1042" y="356" text-anchor="middle" fill="#BE123C">→ quality_results</text>
    <text class="cls" x="1042" y="374" text-anchor="middle" fill="#BE123C">(agent_name · status)</text>
  </g>

  <!-- aggregate (fan-in) -->
  <rect x="415" y="442" width="350" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="465" text-anchor="middle" font-size="12">aggregate</text>
  <text class="ns" x="590" y="482" text-anchor="middle">weighted overall from quality_results (by agent_name) → aggregation · overall_score</text>

  <!-- decision gate (3-way) -->
  <rect x="375" y="530" width="430" height="92" rx="10" fill="#FFFFFF" stroke="#BE123C" stroke-width="2.2"/>
  <text class="nt" x="590" y="553" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges</text>
  <text class="ns" x="590" y="574" text-anchor="middle">any result status = failed (or invalid) → rejected</text>
  <text class="ns" x="590" y="592" text-anchor="middle">else overall ≥ 80 → approved</text>
  <text class="ns" x="590" y="610" text-anchor="middle">else overall ≥ 60 → needs_review · else rejected</text>

  <!-- agent_review (HITL node) -->
  <rect x="730" y="662" width="230" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="845" y="686" text-anchor="middle" fill="#92400E" font-size="12">agent_review</text>
  <text class="ns" x="845" y="703" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="754" width="475" height="162" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="776" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="792" width="230" height="50" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="765" y="813" text-anchor="middle" fill="#0F172A" font-size="12">Reviewer decision</text>
  <text class="ns" x="765" y="830" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="797" y="888" text-anchor="middle" fill="#B45309">approve → &lt;STATUS&gt;_confirmed · override → reviewer_override</text>

  <!-- report -->
  <rect x="420" y="952" width="340" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="976" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="994" text-anchor="middle">fold human_decision → final status + report · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1050" width="110" height="36" rx="18" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1073" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1072" text-anchor="start" fill="#475569">report.final_status · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 122 V140" marker-end="url(#arrow)"/>
  <rect x="600" y="122" width="176" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="133" text-anchor="start">run_quality_check(product)</text>

  <!-- fan-out validate → 6 -->
  <path class="flow" d="M590 198 V216 H137 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H318 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H499 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H680 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H861 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H1042 V262" marker-end="url(#arrow)"/>

  <!-- fan-in 6 → aggregate -->
  <path class="flow" d="M137 400 V422 H590 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M318 400 V422 H590"/>
  <path class="flow" d="M499 400 V422 H590"/>
  <path class="flow" d="M680 400 V422 H590"/>
  <path class="flow" d="M861 400 V422 H590"/>
  <path class="flow" d="M1042 400 V422 H590"/>
  <rect x="470" y="415" width="240" height="14" fill="#FFFFFF"/>
  <text class="el" x="590" y="426" text-anchor="middle">fan-in: add_edge([6] → aggregate)</text>

  <path class="flow" d="M590 496 V530" marker-end="url(#arrow)"/>

  <!-- decision → report (approved) -->
  <path class="flow" d="M505 622 V952" marker-end="url(#arrow)"/>
  <rect x="462" y="640" width="86" height="15" fill="#FFFFFF"/>
  <text class="el" x="505" y="652" text-anchor="middle" fill="#047857">approved</text>

  <!-- decision → agent_review (non-approved) -->
  <path class="flow" d="M690 622 V644 H845 V662" marker-end="url(#arrow)"/>
  <rect x="694" y="636" width="196" height="15" fill="#FFFFFF"/>
  <text class="el" x="792" y="648" text-anchor="middle" fill="#B45309">route_after_decision → agent_review</text>

  <!-- agent_review → HITL band -->
  <path class="flow" d="M845 720 V754" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 916 V952" marker-end="url(#arrow)"/>
  <rect x="626" y="924" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="936" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1010 V1050" marker-end="url(#arrow)"/>

  <!-- report → quality store -->
  <path class="mem" d="M760 981 H1055" marker-end="url(#arrowMem)"/>
  <rect x="836" y="973" width="90" height="15" fill="#FFFFFF"/>
  <text class="el" x="881" y="985" text-anchor="middle" fill="#BE123C">save_check</text>

  <!-- agent_review → checkpointer -->
  <path class="mem" d="M960 691 H1055" marker-end="url(#arrowMem)"/>
  <rect x="968" y="683" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1021" y="695" text-anchor="middle" fill="#BE123C">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1116)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#FFF1F2" stroke="#BE123C"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">reviewer HITL (interrupt)</text>
    <rect x="540" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="562" y="22">END</text>
    <line class="mem" x1="620" y1="18" x2="660" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="668" y="22">SQLite checkpointer / quality store I/O</text>
  </g>
</svg>
