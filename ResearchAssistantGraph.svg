<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1230 1150" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowHitl" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#B45309"/></marker>
    <marker id="arrowFlag" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#94A3B8"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#9F1239"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:12px; font-weight:700; fill:#9F1239; }
    .ns { font-size:10.5px; fill:#475569; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .eh { font-size:10px; fill:#B45309; font-weight:600; }
    .ef { font-size:10px; fill:#64748B; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .lg { font-size:11px; fill:#334155; }
    .cal { font-size:9.5px; fill:#881337; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .hitl { stroke:#B45309; stroke-width:1.8; fill:none; }
    .flag { stroke:#94A3B8; stroke-width:1.6; fill:none; stroke-dasharray:6 4; }
    .mem  { stroke:#9F1239; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>
  <rect x="0" y="0" width="1230" height="1150" fill="#FFFFFF"/>
  <text class="title" x="40" y="40">Autonomous Research Assistant — LangGraph</text>
  <text class="subtitle" x="41" y="62">StateGraph · 10 nodes · a mostly-LINEAR pipeline · deterministic corpus retrieval · one review gate (HITL) · SqliteSaver</text>
  <rect x="375" y="54" width="110" height="34" rx="17" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.4"/>
  <text class="pill" x="430" y="75.0" text-anchor="middle" fill="#9F1239">START</text>
  <rect x="200" y="104" width="460" height="64" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="430" y="123" text-anchor="middle">validate · DETERMINISTIC</text>
  <text class="ns" x="430" y="141" text-anchor="middle" fill="#475569">at least MIN_QUERY_LENGTH (8) characters</text>
  <text class="ns" x="430" y="157" text-anchor="middle" fill="#B45309">otherwise → record_flagged = True · no agent runs</text>
  <rect x="200" y="194" width="460" height="58" rx="10" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
  <text class="nt" x="430" y="213" text-anchor="middle">classify</text>
  <text class="ns" x="430" y="231" text-anchor="middle" fill="#475569">QueryClassifierAgent · what KIND of question</text>
  <text class="ns" x="430" y="247" text-anchor="middle" fill="#9F1239">→ query_type</text>
  <rect x="200" y="284" width="460" height="58" rx="10" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
  <text class="nt" x="430" y="303" text-anchor="middle">plan</text>
  <text class="ns" x="430" y="321" text-anchor="middle" fill="#475569">PlannerAgent · min..max search queries (3–5)</text>
  <text class="ns" x="430" y="337" text-anchor="middle" fill="#9F1239">→ search_queries</text>
  <rect x="200" y="374" width="460" height="72" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="430" y="393" text-anchor="middle">gather · a TOOL · DETERMINISTIC, NO LLM</text>
  <text class="ns" x="430" y="411" text-anchor="middle" fill="#475569">corpus_service.search() · relevance_scoring_service</text>
  <text class="ns" x="430" y="427" text-anchor="middle" fill="#475569">dedup by id, keep highest score · → search_results</text>
  <rect x="200" y="478" width="460" height="60" rx="10" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
  <text class="nt" x="430" y="497" text-anchor="middle">evaluate</text>
  <text class="ns" x="430" y="515" text-anchor="middle" fill="#475569">SourceEvaluatorAgent · keep the credible sources</text>
  <text class="ns" x="430" y="531" text-anchor="middle" fill="#475569">cap at max_sources (8) · → evaluated_sources</text>
  <rect x="200" y="570" width="460" height="60" rx="10" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
  <text class="nt" x="430" y="589" text-anchor="middle">synthesize</text>
  <text class="ns" x="430" y="607" text-anchor="middle" fill="#475569">SynthesizerAgent · sources → cited findings</text>
  <text class="ns" x="430" y="623" text-anchor="middle" fill="#9F1239">→ research_summary · findings</text>
  <rect x="200" y="662" width="460" height="60" rx="10" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
  <text class="nt" x="430" y="681" text-anchor="middle">fact_check</text>
  <text class="ns" x="430" y="699" text-anchor="middle" fill="#475569">FactCheckerAgent · verify each finding vs its sources</text>
  <text class="ns" x="430" y="715" text-anchor="middle" fill="#9F1239">→ fact_check_results (verified · flagged · all_grounded)</text>
  <rect x="200" y="754" width="460" height="84" rx="10" fill="#FFFFFF" stroke="#9F1239" stroke-width="2"/>
  <text class="nt" x="430" y="773" text-anchor="middle">review_triage · DETERMINISTIC, NO LLM</text>
  <text class="ns" x="430" y="791" text-anchor="middle" fill="#B45309">pause if a finding was FLAGGED,</text>
  <text class="ns" x="430" y="807" text-anchor="middle" fill="#475569">or evidence is thin (&lt; min_sources_for_confidence, 3)</text>
  <text class="ns" x="430" y="823" text-anchor="middle" fill="#9F1239">→ requires_review</text>
  <rect x="200" y="866" width="460" height="86" rx="10" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.5"/>
  <text class="nt" x="430" y="885" text-anchor="middle">report</text>
  <text class="ns" x="430" y="903" text-anchor="middle" fill="#475569">ReportGeneratorAgent · writes from VERIFIED findings only</text>
  <text class="ns" x="430" y="919" text-anchor="middle" fill="#B45309">flagged query → FLAGGED stub · sent back → REVISION note (no agent)</text>
  <text class="ns" x="430" y="935" text-anchor="middle" fill="#9F1239">→ report · final_report · status</text>
  <rect x="375" y="978" width="110" height="34" rx="17" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="430" y="999.0" text-anchor="middle" fill="#166534">END</text>
  <rect x="770" y="760" width="360" height="120" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.8"/>
  <text class="nt" x="950.0" y="782" text-anchor="middle" fill="#92400E">review · HITL</text>
  <text class="ns" x="950.0" y="802" text-anchor="middle" fill="#92400E">interrupt() · pause on the checkpointer</text>
  <text class="ns" x="950.0" y="819" text-anchor="middle" fill="#92400E">the reviewer APPROVES or SENDS BACK</text>
  <text class="ns" x="950.0" y="836" text-anchor="middle" fill="#92400E">approve → report from verified findings</text>
  <text class="ns" x="950.0" y="853" text-anchor="middle" fill="#92400E">send back → REVISION_REQUESTED, no report</text>
  <path class="flow" d="M430 88 V100" marker-end="url(#arrow)"/>
  <text class="el" x="442" y="99.0">run_research(query)</text>
  <path class="flow" d="M430 168 V190" marker-end="url(#arrow)"/>
  <path class="flow" d="M430 252 V280" marker-end="url(#arrow)"/>
  <path class="flow" d="M430 342 V370" marker-end="url(#arrow)"/>
  <path class="flow" d="M430 446 V474" marker-end="url(#arrow)"/>
  <path class="flow" d="M430 538 V566" marker-end="url(#arrow)"/>
  <path class="flow" d="M430 630 V658" marker-end="url(#arrow)"/>
  <path class="flow" d="M430 722 V750" marker-end="url(#arrow)"/>
  <text class="el" x="442" y="184.0">usable</text>
  <path class="flow" d="M430 838 V862" marker-end="url(#arrow)"/>
  <text class="el" x="442" y="855.0">clean</text>
  <path class="flow" d="M430 952 V974" marker-end="url(#arrow)"/>
  <path class="hitl" d="M660 796.0 H700 V796.0 H766" marker-end="url(#arrowHitl)"/>
  <text class="eh" x="668" y="788.0">uncertain: flagged, or thin evidence</text>
  <path class="hitl" d="M770 860 H720 V909.0 H664" marker-end="url(#arrowHitl)"/>
  <text class="eh" x="712" y="901.0" text-anchor="end">approve / send back</text>
  <path class="flag" d="M660 136.0 H1175 V909.0 H664" marker-end="url(#arrowFlag)"/>
  <text class="ef" x="1169" y="128.0" text-anchor="end">unusable query → FLAGGED, no agent runs</text>
  <g><rect x="860" y="960" width="190" height="46" fill="#F1F5F9" stroke="none"/><line x1="860" y1="960" x2="860" y2="1006" stroke="#475569" stroke-width="1.3"/><line x1="1050" y1="960" x2="1050" y2="1006" stroke="#475569" stroke-width="1.3"/><ellipse cx="955" cy="1006" rx="95" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/><ellipse cx="955" cy="960" rx="95" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/><text class="nt" x="955" y="984" text-anchor="middle" fill="#334155">SqliteSaver</text><text class="ns" x="955" y="999" text-anchor="middle" fill="#334155">checkpoints.db (1 file)</text></g>
  <g><rect x="95" y="978" width="190" height="46" fill="#F1F5F9" stroke="none"/><line x1="95" y1="978" x2="95" y2="1024" stroke="#475569" stroke-width="1.3"/><line x1="285" y1="978" x2="285" y2="1024" stroke="#475569" stroke-width="1.3"/><ellipse cx="190" cy="1024" rx="95" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/><ellipse cx="190" cy="978" rx="95" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/><text class="nt" x="190" y="1002" text-anchor="middle" fill="#334155">Research store</text><text class="ns" x="190" y="1017" text-anchor="middle" fill="#334155">research_history.db</text></g>
  <path class="mem" d="M950.0 880 V920 H955 V952" marker-end="url(#arrowMem)"/>
  <text class="cal" x="900" y="899" text-anchor="end">durable checkpoint</text>
  <path class="mem" d="M200 909.0 H190 V970" marker-end="url(#arrowMem)"/>
  <text class="cal" x="184" y="901.0" text-anchor="end">save_research</text>
  <g transform="translate(40,1108)">
    <rect x="0" y="0" width="18" height="12" rx="3" fill="#FFF1F2" stroke="#9F1239" stroke-width="1.4"/>
    <text class="lg" x="26" y="10">LLM agent node</text>
    <rect x="150" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.4"/>
    <text class="lg" x="176" y="10">deterministic node</text>
    <rect x="322" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#9F1239" stroke-width="2"/>
    <text class="lg" x="348" y="10">deterministic gate</text>
    <rect x="500" y="0" width="18" height="12" rx="3" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
    <text class="lg" x="526" y="10">review (HITL)</text>
    <line x1="640" y1="6" x2="676" y2="6" stroke="#B45309" stroke-width="1.8"/>
    <text class="lg" x="684" y="10">uncertain → review</text>
    <line x1="830" y1="6" x2="866" y2="6" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="6 4"/>
    <text class="lg" x="874" y="10">flagged bypass</text>
    <line x1="1000" y1="6" x2="1036" y2="6" stroke="#9F1239" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text class="lg" x="1044" y="10">persistence</text>
  </g>
</svg>