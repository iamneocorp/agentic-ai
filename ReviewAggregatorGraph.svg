<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1460" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#4D7C0F"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#365314; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#4D7C0F; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#4D7C0F; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#4D7C0F; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1460" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Restaurant Review Aggregator — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · validate → 5 analyses in parallel → coordinator → decision (critical gate first) → THREE-WAY split into agents · interrupt() editor HITL · SqliteSaver</text>

  <!-- checkpointer store -->
  <g>
    <rect x="1105" y="964" width="160" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1105" y1="964" x2="1105" y2="1014" stroke="#475569" stroke-width="1.3"/>
    <line x1="1265" y1="964" x2="1265" y2="1014" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1185" cy="1014" rx="80" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1185" cy="964" rx="80" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1185" y="988" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1185" y="1003" text-anchor="middle" fill="#334155">checkpoints.db (WAL)</text>
  </g>
  <!-- review store -->
  <g>
    <rect x="1105" y="1256" width="160" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1105" y1="1256" x2="1105" y2="1306" stroke="#475569" stroke-width="1.3"/>
    <line x1="1265" y1="1256" x2="1265" y2="1306" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1185" cy="1306" rx="80" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1185" cy="1256" rx="80" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1185" y="1280" text-anchor="middle" fill="#334155" font-size="12">Review store</text>
    <text class="ns" x="1185" y="1295" text-anchor="middle" fill="#334155">reviews.db</text>
  </g>

  <!-- START -->
  <rect x="585" y="72" width="110" height="34" rx="17" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.4"/>
  <text class="nt" x="640" y="94" text-anchor="middle">START</text>

  <!-- validate -->
  <rect x="370" y="124" width="540" height="72" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="640" y="146" text-anchor="middle" font-size="12">validate</text>
  <text class="ns" x="640" y="165" text-anchor="middle">REQUIRED_FIELDS on restaurant · at least min_reviews = 5 reviews to judge on</text>
  <text class="ns" x="640" y="183" text-anchor="middle" fill="#4D7C0F">otherwise → record_flagged = True · the five analyses skip · zero token cost</text>

  <!-- analysis band (5 parallel) -->
  <rect x="42" y="220" width="1196" height="180" rx="12" fill="#F7FEE7" stroke="#D9F99D" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="240">5 in parallel</text>
  <g>
    <rect x="57" y="252" width="214" height="130" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.5"/>
    <text class="nt" x="164" y="276" text-anchor="middle" font-size="12">food_quality</text>
    <text class="ns" x="164" y="293" text-anchor="middle">FoodQualityAgent</text>
    <line x1="77" y1="305" x2="251" y2="305" stroke="#D9F99D"/>
    <text class="chip" x="164" y="324" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="164" y="346" text-anchor="middle" fill="#4D7C0F">→ food_results</text>
    <text class="ns" x="164" y="364" text-anchor="middle" fill="#4D7C0F">(food_quality_score)</text>
  </g>
  <g>
    <rect x="295" y="252" width="214" height="130" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.5"/>
    <text class="nt" x="402" y="276" text-anchor="middle" font-size="12">hygiene</text>
    <text class="ns" x="402" y="293" text-anchor="middle">HygieneAgent</text>
    <line x1="315" y1="305" x2="489" y2="305" stroke="#D9F99D"/>
    <text class="chip" x="402" y="324" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="402" y="346" text-anchor="middle" fill="#4D7C0F">→ hygiene_results</text>
    <text class="ns" x="402" y="364" text-anchor="middle" fill="#4D7C0F">(hygiene_score)</text>
  </g>
  <g>
    <rect x="533" y="252" width="214" height="130" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.5"/>
    <text class="nt" x="640" y="276" text-anchor="middle" font-size="12">sentiment</text>
    <text class="ns" x="640" y="293" text-anchor="middle">SentimentAgent</text>
    <line x1="553" y1="305" x2="727" y2="305" stroke="#D9F99D"/>
    <text class="chip" x="640" y="324" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="640" y="346" text-anchor="middle" fill="#4D7C0F">→ sentiment_results</text>
    <text class="ns" x="640" y="364" text-anchor="middle" fill="#4D7C0F">(sentiment_score 0–10)</text>
  </g>
  <g>
    <rect x="771" y="252" width="214" height="130" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.5"/>
    <text class="nt" x="878" y="276" text-anchor="middle" font-size="12">pricing</text>
    <text class="ns" x="878" y="293" text-anchor="middle">PricingAgent</text>
    <line x1="791" y1="305" x2="965" y2="305" stroke="#D9F99D"/>
    <text class="chip" x="878" y="324" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="878" y="346" text-anchor="middle" fill="#4D7C0F">→ pricing_results</text>
    <text class="ns" x="878" y="364" text-anchor="middle" fill="#4D7C0F">(pricing_score)</text>
  </g>
  <g>
    <rect x="1009" y="252" width="214" height="130" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.5"/>
    <text class="nt" x="1116" y="276" text-anchor="middle" font-size="12">ambiance</text>
    <text class="ns" x="1116" y="293" text-anchor="middle">AmbianceAgent</text>
    <line x1="1029" y1="305" x2="1203" y2="305" stroke="#D9F99D"/>
    <text class="chip" x="1116" y="324" text-anchor="middle">LLM · score 0–10</text>
    <text class="ns" x="1116" y="346" text-anchor="middle" fill="#4D7C0F">→ ambiance_results</text>
    <text class="ns" x="1116" y="364" text-anchor="middle" fill="#4D7C0F">(ambiance_score)</text>
  </g>

  <!-- coordinator -->
  <rect x="300" y="450" width="680" height="88" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="640" y="472" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="640" y="491" text-anchor="middle">weighted 0.30·food + 0.25·hygiene + 0.20·sentiment + 0.15·pricing + 0.10·ambiance</text>
  <text class="ns" x="640" y="509" text-anchor="middle">every component score is on the SAME 0–10 scale — the weights only work if it is</text>
  <text class="chip" x="640" y="529" text-anchor="middle">→ overall_rating · coordination_summary</text>

  <!-- decision -->
  <rect x="280" y="572" width="720" height="164" rx="10" fill="#FFFFFF" stroke="#4D7C0F" stroke-width="2.2"/>
  <text class="nt" x="640" y="596" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges · CRITICAL GATE first, then the bands</text>
  <text class="ns" x="640" y="620" text-anchor="middle">critical: hygiene &lt; 8.0 · else food &lt; 7.0 · else sentiment &lt; 6.0 → NEEDS_IMPROVEMENT</text>
  <text class="ns" x="640" y="638" text-anchor="middle" fill="#4D7C0F">the gate OUTRANKS the weighted mean — and is SKIPPED for a flagged record</text>
  <text class="ns" x="640" y="660" text-anchor="middle">else ≥ 8.0 → EXCELLENT · ≥ 7.0 → GOOD · ≥ 6.0 → ACCEPTABLE · else → NEEDS_IMPROVEMENT</text>
  <text class="chip" x="640" y="682" text-anchor="middle">+ recommendation_level: ≥ 8.5 HIGHLY_RECOMMENDED · ≥ 7.0 RECOMMENDED · ≥ 5.0 NEUTRAL · else NOT_RECOMMENDED</text>
  <text class="chip" x="640" y="702" text-anchor="middle">+ priority = EDITORIAL attention: EXCELLENT/GOOD → LOW · ACCEPTABLE → MEDIUM · NEEDS_IMPROVEMENT → HIGH</text>
  <text class="chip" x="640" y="722" text-anchor="middle">→ decision · recommendation_level · priority · has_critical_issues · critical_reason · decision_metrics</text>

  <!-- publication (favourable branch, agent) -->
  <rect x="70" y="800" width="300" height="96" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.8"/>
  <text class="nt" x="220" y="822" text-anchor="middle" font-size="12">publication</text>
  <text class="ns" x="220" y="840" text-anchor="middle">PublicationAgent</text>
  <text class="ns" x="220" y="857" text-anchor="middle">analyze(restaurant, summary, decision)</text>
  <text class="ns" x="220" y="878" text-anchor="middle" fill="#4D7C0F">→ publication_draft</text>

  <!-- improvement_plan (NEEDS_IMPROVEMENT branch, agent) -->
  <rect x="420" y="800" width="320" height="96" rx="10" fill="#F7FEE7" stroke="#4D7C0F" stroke-width="1.8"/>
  <text class="nt" x="580" y="822" text-anchor="middle" font-size="12">improvement_plan</text>
  <text class="ns" x="580" y="840" text-anchor="middle">ImprovementPlanAgent</text>
  <text class="ns" x="580" y="857" text-anchor="middle">analyze(restaurant, summary, decision)</text>
  <text class="ns" x="580" y="878" text-anchor="middle" fill="#4D7C0F">→ improvement_plan</text>

  <!-- editor_review (HITL node) -->
  <rect x="790" y="960" width="250" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="915" y="984" text-anchor="middle" fill="#92400E" font-size="12">editor_review</text>
  <text class="ns" x="915" y="1001" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="655" y="1050" width="465" height="150" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="671" y="1072" fill="#B45309" font-size="10.5">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="785" y="1088" width="230" height="48" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="900" y="1108" text-anchor="middle" fill="#0F172A" font-size="12">Editor decision</text>
  <text class="ns" x="900" y="1124" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="900" y="1174" text-anchor="middle" fill="#B45309">approve → &lt;DECISION&gt;_confirmed · override → editor_overridden</text>

  <!-- report -->
  <rect x="440" y="1250" width="400" height="62" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="640" y="1274" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="640" y="1293" text-anchor="middle">folds in whichever branch ran · exactly one draft/plan is present</text>

  <!-- END -->
  <rect x="585" y="1350" width="110" height="34" rx="17" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="640" y="1372" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="710" y="1371" text-anchor="start" fill="#475569">report.decision · recommendation_level · priority · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M640 106 V124" marker-end="url(#arrow)"/>
  <rect x="650" y="106" width="150" height="14" fill="#FFFFFF"/>
  <text class="el" x="654" y="117" text-anchor="start">run_review(restaurant)</text>

  <!-- fan-out validate → 5 analyses -->
  <path class="flow" d="M640 196 V212 H164 V252" marker-end="url(#arrow)"/>
  <path class="flow" d="M640 196 V212 H402 V252" marker-end="url(#arrow)"/>
  <path class="flow" d="M640 196 V212 H640 V252" marker-end="url(#arrow)"/>
  <path class="flow" d="M640 196 V212 H878 V252" marker-end="url(#arrow)"/>
  <path class="flow" d="M640 196 V212 H1116 V252" marker-end="url(#arrow)"/>

  <!-- 5 analyses → coordinator (fan-in: waits for ALL five) -->
  <path class="flow" d="M164 382 V416"/>
  <path class="flow" d="M402 382 V416"/>
  <path class="flow" d="M640 382 V416"/>
  <path class="flow" d="M878 382 V416"/>
  <path class="flow" d="M1116 382 V416"/>
  <path class="flow" d="M164 416 H1116"/>
  <path class="flow" d="M640 416 V450" marker-end="url(#arrow)"/>
  <rect x="662" y="424" width="410" height="15" fill="#FFFFFF"/>
  <text class="el" x="666" y="436" text-anchor="start" fill="#4D7C0F">fan-in: add_edge(ANALYSIS_NODES → coordinator) · waits for ALL five</text>
  <rect x="46" y="424" width="308" height="15" fill="#FFFFFF"/>
  <text class="el" x="50" y="436" text-anchor="start" fill="#4D7C0F">the five analyses are genuinely independent</text>

  <path class="flow" d="M640 538 V572" marker-end="url(#arrow)"/>

  <!-- 3-way conditional split -->
  <path class="flow" d="M400 736 V776 H220 V800" marker-end="url(#arrow)"/>
  <rect x="406" y="750" width="118" height="15" fill="#FFFFFF"/>
  <text class="el" x="410" y="762" text-anchor="start" fill="#047857">favourable verdict</text>

  <path class="flow" d="M580 736 V800" marker-end="url(#arrow)"/>
  <rect x="586" y="750" width="126" height="15" fill="#FFFFFF"/>
  <text class="el" x="590" y="762" text-anchor="start" fill="#B45309">NEEDS_IMPROVEMENT</text>

  <path class="flow" d="M880 736 V960" marker-end="url(#arrow)"/>
  <rect x="886" y="750" width="186" height="15" fill="#FFFFFF"/>
  <text class="el" x="890" y="762" text-anchor="start" fill="#B45309">record_flagged → no agent runs</text>

  <!-- improvement_plan → editor_review -->
  <path class="flow" d="M580 896 V930 H970 V960" marker-end="url(#arrow)"/>
  <rect x="700" y="908" width="170" height="15" fill="#FFFFFF"/>
  <text class="el" x="785" y="920" text-anchor="middle" fill="#B45309">plan first, then the editor</text>

  <!-- editor_review → HITL band -->
  <path class="flow" d="M915 1018 V1050" marker-end="url(#arrow)"/>

  <!-- publication → report (no human) -->
  <path class="flow" d="M220 896 V1230 H520 V1250" marker-end="url(#arrow)"/>
  <rect x="226" y="1000" width="182" height="15" fill="#FFFFFF"/>
  <text class="el" x="230" y="1012" text-anchor="start" fill="#047857">no human — publishes itself</text>

  <!-- HITL resume → report -->
  <path class="flow" d="M760 1200 V1250" marker-end="url(#arrow)"/>
  <rect x="620" y="1214" width="132" height="15" fill="#FFFBEB"/>
  <text class="el" x="748" y="1226" text-anchor="end" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M640 1312 V1350" marker-end="url(#arrow)"/>

  <!-- report → review store -->
  <path class="mem" d="M840 1281 H1105" marker-end="url(#arrowMem)"/>
  <rect x="900" y="1273" width="98" height="15" fill="#FFFFFF"/>
  <text class="el" x="949" y="1285" text-anchor="middle" fill="#4D7C0F">save_review</text>

  <!-- editor_review → checkpointer -->
  <path class="mem" d="M1040 989 H1105" marker-end="url(#arrowMem)"/>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1400)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#F7FEE7" stroke="#4D7C0F"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">editor HITL (interrupt)</text>
    <rect x="535" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="557" y="22">END</text>
    <line class="mem" x1="615" y1="18" x2="655" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="663" y="22">SQLite checkpointer / review store I/O</text>
  </g>
</svg>
