<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 1320" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#94A3B8"/></marker>
    <marker id="arrowT" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0D9488"/></marker>
    <marker id="arrowH" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#D97706"/></marker>
    <marker id="arrowR" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#EF4444"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0D9488"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:12.5px; font-weight:700; }
    .ns { font-size:10.5px; }
    .el { font-size:10px; fill:#0D9488; font-weight:600; }
    .eh { font-size:10px; fill:#B45309; font-weight:600; }
    .er { font-size:10px; fill:#B91C1C; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .lg { font-size:11px; fill:#334155; }
    .cal { font-size:9.5px; fill:#0F766E; }
    .flow { stroke:#94A3B8; stroke-width:1.6; fill:none; }
    .gate { stroke:#2DD4BF; stroke-width:1.8; fill:none; }
    .hit  { stroke:#F59E0B; stroke-width:1.8; fill:none; }
    .res  { stroke:#EF4444; stroke-width:1.7; fill:none; }
    .mem  { stroke:#2DD4BF; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>
<rect x="0" y="0" width="1240" height="1320" fill="#FFFFFF"/>
<text class="title" x="40" y="40">Smart City Infrastructure Manager — CrewAI Flow</text>
<text class="subtitle" x="41" y="62">Flow · @start → three @router gates (monitoring · optimization · traffic) → priority @router (urgency_score) → or_() → finalize · 4 pure-LLM agents · 8 tools · SQLite audit trail</text>
<rect x="485" y="54" width="110" height="34" rx="17" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.6"/>
<text class="pill" x="540" y="76" text-anchor="middle" fill="#0D9488">START</text>
<rect x="290" y="104" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="123" text-anchor="middle" fill="#0D9488">conduct_infrastructure_monitoring</text>
<text class="ns" x="540" y="140" text-anchor="middle" fill="#475569">@start · InfrastructureMonitorAgent</text>
<text class="ns" x="540" y="155" text-anchor="middle" fill="#475569">tools: Infrastructure Monitoring System · IoT Sensor Network Monitor</text>
<text class="ns" x="540" y="170" text-anchor="middle" fill="#0D9488">→ infrastructure_data · health_score</text>
<rect x="320" y="210" width="440" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
<text class="nt" x="540" y="229" text-anchor="middle" fill="#0D9488">route_by_monitoring</text>
<text class="ns" x="540" y="246" text-anchor="middle" fill="#475569">@router — GATE 1</text>
<text class="ns" x="540" y="261" text-anchor="middle" fill="#475569">health_score ≥ health_floor (70) ?</text>
<rect x="900" y="204" width="275" height="80" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.8"/>
<text class="nt" x="1037.5" y="223" text-anchor="middle" fill="#B91C1C">skip_optimization</text>
<text class="ns" x="1037.5" y="240" text-anchor="middle" fill="#475569">@listen(monitoring_failed)</text>
<text class="ns" x="1037.5" y="255" text-anchor="middle" fill="#475569">health below the floor</text>
<text class="ns" x="1037.5" y="270" text-anchor="middle" fill="#0D9488">→ MONITORING_FAILED</text>
<rect x="290" y="316" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="335" text-anchor="middle" fill="#0D9488">optimize_resources</text>
<text class="ns" x="540" y="352" text-anchor="middle" fill="#475569">@listen(monitored) · ResourceOptimizerAgent</text>
<text class="ns" x="540" y="367" text-anchor="middle" fill="#475569">tools: Energy Grid Analyzer · Water and Waste Management Analyzer</text>
<text class="ns" x="540" y="382" text-anchor="middle" fill="#0D9488">→ resource_analysis · energy_efficiency</text>
<rect x="320" y="430" width="440" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
<text class="nt" x="540" y="449" text-anchor="middle" fill="#0D9488">route_by_optimization</text>
<text class="ns" x="540" y="466" text-anchor="middle" fill="#475569">@router — GATE 2</text>
<text class="ns" x="540" y="481" text-anchor="middle" fill="#475569">energy_efficiency ≥ efficiency_floor (60) ?</text>
<rect x="900" y="424" width="275" height="72" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
<text class="nt" x="1037.5" y="443" text-anchor="middle" fill="#334155">skip_traffic_analysis</text>
<text class="ns" x="1037.5" y="460" text-anchor="middle" fill="#475569">@listen(optimization_failed)</text>
<text class="ns" x="1037.5" y="475" text-anchor="middle" fill="#475569">efficiency below the floor</text>
<text class="ns" x="1037.5" y="490" text-anchor="middle" fill="#0D9488">→ OPTIMIZATION_FAILED</text>
<rect x="290" y="536" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="555" text-anchor="middle" fill="#0D9488">analyze_traffic</text>
<text class="ns" x="540" y="572" text-anchor="middle" fill="#475569">@listen(optimized) · TrafficAnalyzerAgent</text>
<text class="ns" x="540" y="587" text-anchor="middle" fill="#475569">tools: Traffic Flow Analyzer · Public Transit Analyzer</text>
<text class="ns" x="540" y="602" text-anchor="middle" fill="#0D9488">→ traffic_analysis · congestion_level</text>
<rect x="320" y="650" width="440" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
<text class="nt" x="540" y="669" text-anchor="middle" fill="#0D9488">route_by_traffic</text>
<text class="ns" x="540" y="686" text-anchor="middle" fill="#475569">@router — GATE 3</text>
<text class="ns" x="540" y="701" text-anchor="middle" fill="#475569">congestion_level ≤ congestion_ceiling (75) ?</text>
<rect x="900" y="644" width="275" height="72" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
<text class="nt" x="1037.5" y="663" text-anchor="middle" fill="#334155">skip_maintenance</text>
<text class="ns" x="1037.5" y="680" text-anchor="middle" fill="#475569">@listen(traffic_failed)</text>
<text class="ns" x="1037.5" y="695" text-anchor="middle" fill="#475569">congestion over the ceiling</text>
<text class="ns" x="1037.5" y="710" text-anchor="middle" fill="#0D9488">→ TRAFFIC_ANALYSIS_FAILED</text>
<rect x="290" y="756" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="775" text-anchor="middle" fill="#0D9488">plan_maintenance</text>
<text class="ns" x="540" y="792" text-anchor="middle" fill="#475569">@listen(analyzed) · MaintenancePlannerAgent</text>
<text class="ns" x="540" y="807" text-anchor="middle" fill="#475569">tools: Asset Lifecycle Analyzer · Budget Forecast Analyzer</text>
<text class="ns" x="540" y="822" text-anchor="middle" fill="#0D9488">→ urgency_score · maintenance_plan · report</text>
<rect x="320" y="870" width="440" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
<text class="nt" x="540" y="889" text-anchor="middle" fill="#0D9488">route_by_priority</text>
<text class="ns" x="540" y="906" text-anchor="middle" fill="#475569">@router — PRIORITY · on urgency_score</text>
<text class="ns" x="540" y="921" text-anchor="middle" fill="#475569">≥ 70 → critical · ≥ 45 → high · else medium</text>
<rect x="100" y="986" width="270" height="72" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.7"/>
<text class="nt" x="235" y="1005" text-anchor="middle" fill="#166534">mark_medium</text>
<text class="ns" x="235" y="1022" text-anchor="middle" fill="#475569">@listen(medium)</text>
<text class="ns" x="235" y="1037" text-anchor="middle" fill="#475569">auto-complete</text>
<text class="ns" x="235" y="1052" text-anchor="middle" fill="#0D9488">→ COMPLETED · MEDIUM</text>
<rect x="420" y="986" width="270" height="72" rx="10" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.7"/>
<text class="nt" x="555" y="1005" text-anchor="middle" fill="#166534">mark_high</text>
<text class="ns" x="555" y="1022" text-anchor="middle" fill="#475569">@listen(high)</text>
<text class="ns" x="555" y="1037" text-anchor="middle" fill="#475569">auto-complete</text>
<text class="ns" x="555" y="1052" text-anchor="middle" fill="#0D9488">→ COMPLETED · HIGH</text>
<rect x="740" y="986" width="270" height="72" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.8"/>
<text class="nt" x="875" y="1005" text-anchor="middle" fill="#92400E">flag_for_review</text>
<text class="ns" x="875" y="1022" text-anchor="middle" fill="#B45309">@listen(critical) · HITL</text>
<text class="ns" x="875" y="1037" text-anchor="middle" fill="#B45309">queue the plan for a city official</text>
<text class="ns" x="875" y="1052" text-anchor="middle" fill="#0D9488">→ QUEUED_FOR_REVIEW · hitl = True</text>
<rect x="290" y="1122" width="500" height="80" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text class="nt" x="540" y="1141" text-anchor="middle" fill="#334155">finalize_management</text>
<text class="ns" x="540" y="1158" text-anchor="middle" fill="#475569">@listen(or_( all six branches ))</text>
<text class="ns" x="540" y="1173" text-anchor="middle" fill="#475569">stamp timing · persist to the audit trail (record_management)</text>
<text class="ns" x="540" y="1188" text-anchor="middle" fill="#0D9488">→ resolved_at · duration_seconds</text>
<rect x="485" y="1226" width="110" height="34" rx="17" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.8"/>
<text class="pill" x="540" y="1248" text-anchor="middle" fill="#166534">END</text>
<g><rect x="900" y="1140" width="180" height="44" fill="#F1F5F9" stroke="none"/><line x1="900" y1="1140" x2="900" y2="1184" stroke="#475569" stroke-width="1.3"/><line x1="1080" y1="1140" x2="1080" y2="1184" stroke="#475569" stroke-width="1.3"/><ellipse cx="990" cy="1184" rx="90" ry="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/><ellipse cx="990" cy="1140" rx="90" ry="10" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/><text class="nt" x="990" y="1162" text-anchor="middle" fill="#334155">Audit trail</text><text class="ns" x="990" y="1177" text-anchor="middle" fill="#334155">smart_city.db</text></g>
<text class="cal" x="45" y="560">HITL review queue</text>
<text class="cal" x="45" y="574">only CRITICAL urgency</text>
<text class="cal" x="45" y="588">waits for a human</text>
<text class="cal" x="45" y="602">(approval_manager)</text>
<path class="flow" d="M540 88 V102" marker-end="url(#arrow)"/>
<text class="el" x="552" y="99">run_smart_city(city)</text>
<path class="flow" d="M540 184 V210" marker-end="url(#arrow)"/>
<path class="gate" d="M540 272 V316" marker-end="url(#arrowT)"/>
<text class="el" x="552" y="297">monitored</text>
<path class="flow" d="M540 396 V430" marker-end="url(#arrow)"/>
<path class="gate" d="M540 492 V536" marker-end="url(#arrowT)"/>
<text class="el" x="552" y="517">optimized</text>
<path class="flow" d="M540 616 V650" marker-end="url(#arrow)"/>
<path class="gate" d="M540 712 V756" marker-end="url(#arrowT)"/>
<text class="el" x="552" y="737">analyzed</text>
<path class="flow" d="M540 836 V870" marker-end="url(#arrow)"/>
<path class="res" d="M760 241 H906" marker-end="url(#arrowR)"/>
<text class="er" x="792" y="234">monitoring_failed</text>
<path class="flow" d="M760 461 H906" marker-end="url(#arrow)"/>
<text class="eh" x="792" y="454">optimization_failed</text>
<path class="flow" d="M760 681 H906" marker-end="url(#arrow)"/>
<text class="eh" x="792" y="674">traffic_failed</text>
<path class="gate" d="M540 932 V960 H235 V986" marker-end="url(#arrowT)"/>
<text class="el" x="300" y="953">medium</text>
<path class="gate" d="M540 932 V974 H555 V986" marker-end="url(#arrowT)"/>
<text class="el" x="562" y="952">high</text>
<path class="hit" d="M540 932 V960 H875 V986" marker-end="url(#arrowH)"/>
<text class="eh" x="762" y="953">critical</text>
<path class="flow" d="M235 1058 V1094"/>
<path class="flow" d="M555 1058 V1094"/>
<path class="flow" d="M875 1058 V1094"/>
<path class="flow" d="M1175 241 H1205"/>
<path class="flow" d="M1175 461 H1205"/>
<path class="flow" d="M1175 681 H1205"/>
<path class="flow" d="M1205 241 V1094"/>
<path class="flow" d="M235 1094 H1205"/>
<path class="flow" d="M540 1094 V1122" marker-end="url(#arrow)"/>
<text class="el" x="250" y="1088">or_( … )</text>
<path class="flow" d="M540 1202 V1226" marker-end="url(#arrow)"/>
<path class="mem" d="M790 1162 H980" marker-end="url(#arrowMem)"/>
<text class="cal" x="806" y="1154">record_management</text>
<g transform="translate(40,1298)">
<rect x="0" y="0" width="18" height="12" rx="3" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.6"/>
<text class="lg" x="26" y="10">agent step (LLM)</text>
<rect x="155" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="1.6"/>
<text class="lg" x="181" y="10">@router gate</text>
<rect x="285" y="0" width="18" height="12" rx="3" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.6"/>
<text class="lg" x="311" y="10">completed</text>
<rect x="395" y="0" width="18" height="12" rx="3" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.6"/>
<text class="lg" x="421" y="10">HITL queue</text>
<rect x="515" y="0" width="18" height="12" rx="3" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.6"/>
<text class="lg" x="541" y="10">monitoring failed</text>
<rect x="660" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text class="lg" x="686" y="10">skip</text>
<line x1="750" y1="6" x2="782" y2="6" stroke="#2DD4BF" stroke-width="1.8"/>
<text class="lg" x="790" y="10">router branch</text>
</g>
</svg>