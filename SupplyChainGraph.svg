<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 1000" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#94A3B8"/></marker>
    <marker id="arrowT" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0D9488"/></marker>
    <marker id="arrowH" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#D97706"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0D9488"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:12.5px; font-weight:700; }
    .ns { font-size:10.5px; }
    .el { font-size:10px; fill:#0D9488; font-weight:600; }
    .eh { font-size:10px; fill:#B45309; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .lg { font-size:11px; fill:#334155; }
    .cal { font-size:9.5px; fill:#0F766E; }
    .flow { stroke:#94A3B8; stroke-width:1.6; fill:none; }
    .gate { stroke:#2DD4BF; stroke-width:1.8; fill:none; }
    .hit  { stroke:#F59E0B; stroke-width:1.8; fill:none; }
    .mem  { stroke:#2DD4BF; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>
<rect x="0" y="0" width="1160" height="1000" fill="#FFFFFF"/>
<text class="title" x="40" y="40">ECommerce Supply Chain Optimizer — CrewAI Flow</text>
<text class="subtitle" x="41" y="62">Flow · a single @router (turnover) forks PRIORITY / STANDARD mode, rejoined via or_() · 4 pure-LLM agents · 8 tools · SQLite audit trail</text>
<rect x="485" y="54" width="110" height="34" rx="17" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.6"/>
<text class="pill" x="540" y="76" text-anchor="middle" fill="#0D9488">START</text>
<rect x="290" y="104" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="123" text-anchor="middle" fill="#0D9488">optimize_inventory</text>
<text class="ns" x="540" y="140" text-anchor="middle" fill="#475569">@start · InventoryOptimizerAgent</text>
<text class="ns" x="540" y="155" text-anchor="middle" fill="#475569">tools: Inventory Levels System · Warehouse Operations Monitor</text>
<text class="ns" x="540" y="170" text-anchor="middle" fill="#0D9488">→ inventory_data · inventory_turnover · stockout_rate</text>
<rect x="290" y="214" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="233" text-anchor="middle" fill="#0D9488">forecast_demand</text>
<text class="ns" x="540" y="250" text-anchor="middle" fill="#475569">@listen(optimize_inventory) · DemandForecastingAgent</text>
<text class="ns" x="540" y="265" text-anchor="middle" fill="#475569">tools: Sales History Analyzer · Market Trends Intelligence</text>
<text class="ns" x="540" y="280" text-anchor="middle" fill="#0D9488">→ demand_forecast · forecast_accuracy</text>
<rect x="320" y="324" width="440" height="62" rx="10" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="2"/>
<text class="nt" x="540" y="343" text-anchor="middle" fill="#0D9488">route_by_turnover</text>
<text class="ns" x="540" y="360" text-anchor="middle" fill="#475569">@router — TURNOVER (mode selector)</text>
<text class="ns" x="540" y="375" text-anchor="middle" fill="#475569">inventory_turnover &lt; turnover_floor (6.0) ?</text>
<rect x="120" y="424" width="300" height="86" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
<text class="nt" x="270" y="443" text-anchor="middle" fill="#334155">mark_standard_logistics</text>
<text class="ns" x="270" y="460" text-anchor="middle" fill="#475569">@listen(standard)</text>
<text class="ns" x="270" y="475" text-anchor="middle" fill="#475569">healthy turnover — auto</text>
<text class="ns" x="270" y="490" text-anchor="middle" fill="#0D9488">→ logistics_mode = standard</text>
<rect x="680" y="424" width="320" height="86" rx="10" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.8"/>
<text class="nt" x="840" y="443" text-anchor="middle" fill="#92400E">flag_priority_logistics</text>
<text class="ns" x="840" y="460" text-anchor="middle" fill="#B45309">@listen(priority) · HITL</text>
<text class="ns" x="840" y="475" text-anchor="middle" fill="#B45309">low turnover — queue for a manager</text>
<text class="ns" x="840" y="490" text-anchor="middle" fill="#0D9488">→ logistics_mode = priority · hitl = True</text>
<rect x="290" y="560" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="579" text-anchor="middle" fill="#0D9488">optimize_logistics</text>
<text class="ns" x="540" y="596" text-anchor="middle" fill="#475569">@listen(or_( priority , standard )) · LogisticsCoordinatorAgent</text>
<text class="ns" x="540" y="611" text-anchor="middle" fill="#475569">tools: Shipping Operations Monitor · Carrier Rate Analyzer</text>
<text class="ns" x="540" y="626" text-anchor="middle" fill="#0D9488">→ logistics_data · on_time_delivery</text>
<rect x="290" y="670" width="500" height="80" rx="10" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.5"/>
<text class="nt" x="540" y="689" text-anchor="middle" fill="#0D9488">evaluate_suppliers</text>
<text class="ns" x="540" y="706" text-anchor="middle" fill="#475569">@listen(optimize_logistics) · SupplierPerformanceAgent</text>
<text class="ns" x="540" y="721" text-anchor="middle" fill="#475569">tools: Supplier Scorecard System · Procurement Risk Analyzer</text>
<text class="ns" x="540" y="736" text-anchor="middle" fill="#0D9488">→ supplier_quality_score · at_risk_suppliers · report</text>
<rect x="290" y="780" width="500" height="80" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
<text class="nt" x="540" y="799" text-anchor="middle" fill="#334155">finalize_optimization</text>
<text class="ns" x="540" y="816" text-anchor="middle" fill="#475569">@listen(evaluate_suppliers)</text>
<text class="ns" x="540" y="831" text-anchor="middle" fill="#475569">status = QUEUED_FOR_REVIEW if hitl else COMPLETED</text>
<text class="ns" x="540" y="846" text-anchor="middle" fill="#0D9488">→ resolved_at · duration_seconds · persist (record_optimization)</text>
<rect x="485" y="890" width="110" height="34" rx="17" fill="#DCFCE7" stroke="#4ADE80" stroke-width="1.8"/>
<text class="pill" x="540" y="912" text-anchor="middle" fill="#166534">END</text>
<g><rect x="920" y="798" width="180" height="44" fill="#F1F5F9" stroke="none"/><line x1="920" y1="798" x2="920" y2="842" stroke="#475569" stroke-width="1.3"/><line x1="1100" y1="798" x2="1100" y2="842" stroke="#475569" stroke-width="1.3"/><ellipse cx="1010" cy="842" rx="90" ry="10" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/><ellipse cx="1010" cy="798" rx="90" ry="10" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/><text class="nt" x="1010" y="820" text-anchor="middle" fill="#334155">Audit trail</text><text class="ns" x="1010" y="835" text-anchor="middle" fill="#334155">supply_chain.db</text></g>
<text class="cal" x="45" y="250">HITL review queue</text>
<text class="cal" x="45" y="264">a low-turnover run</text>
<text class="cal" x="45" y="278">waits for a manager</text>
<text class="cal" x="45" y="292">(approval_manager)</text>
<path class="flow" d="M540 88 V104" marker-end="url(#arrow)"/>
<text class="el" x="552" y="101">run_supply_chain(company)</text>
<path class="flow" d="M540 184 V214" marker-end="url(#arrow)"/>
<path class="flow" d="M540 294 V324" marker-end="url(#arrow)"/>
<path class="gate" d="M540 386 V405 H270 V424" marker-end="url(#arrowT)"/>
<text class="el" x="356" y="398">standard</text>
<path class="hit" d="M540 386 V405 H840 V424" marker-end="url(#arrowH)"/>
<text class="eh" x="590" y="398">priority (&lt; floor)</text>
<path class="flow" d="M270 510 V535 H540"/>
<path class="flow" d="M840 510 V535 H540"/>
<path class="flow" d="M540 535 V560" marker-end="url(#arrow)"/>
<text class="el" x="548" y="528">or_( … )</text>
<path class="flow" d="M540 640 V670" marker-end="url(#arrow)"/>
<path class="flow" d="M540 750 V780" marker-end="url(#arrow)"/>
<path class="flow" d="M540 860 V890" marker-end="url(#arrow)"/>
<path class="mem" d="M790 820 H920" marker-end="url(#arrowMem)"/>
<text class="cal" x="800" y="812">record_optimization</text>
<g transform="translate(40,958)">
<rect x="0" y="0" width="18" height="12" rx="3" fill="#F0FDFA" stroke="#2DD4BF" stroke-width="1.6"/>
<text class="lg" x="26" y="10">agent step (LLM)</text>
<rect x="155" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#2DD4BF" stroke-width="1.6"/>
<text class="lg" x="181" y="10">@router (mode selector)</text>
<rect x="345" y="0" width="18" height="12" rx="3" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.6"/>
<text class="lg" x="371" y="10">priority mode · HITL</text>
<rect x="510" y="0" width="18" height="12" rx="3" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
<text class="lg" x="536" y="10">standard mode</text>
<line x1="640" y1="6" x2="672" y2="6" stroke="#2DD4BF" stroke-width="1.4" stroke-dasharray="5 4"/>
<text class="lg" x="680" y="10">persistence</text>
</g>
</svg>