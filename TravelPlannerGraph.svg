<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1170" font-family="'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#64748B"/></marker>
    <marker id="arrowMem" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#0F766E"/></marker>
  </defs>
  <style>
    text { fill:#0F172A; }
    .title { font-size:21px; font-weight:700; letter-spacing:-0.3px; }
    .subtitle { font-size:12px; fill:#64748B; }
    .nt { font-size:13px; font-weight:700; fill:#134E4A; }
    .ns { font-size:10.5px; fill:#475569; }
    .chip { font-size:9.5px; font-weight:600; fill:#0F766E; }
    .el { font-size:10px; fill:#475569; font-weight:600; }
    .pill { font-size:12.5px; font-weight:700; }
    .grp { font-size:11px; font-weight:600; fill:#0F766E; }
    .lg { font-size:11px; fill:#334155; }
    .flow { stroke:#64748B; stroke-width:1.6; fill:none; }
    .mem { stroke:#0F766E; stroke-width:1.4; fill:none; stroke-dasharray:5 4; }
  </style>

  <rect x="0" y="0" width="1280" height="1170" fill="#FFFFFF"/>

  <text class="title" x="40" y="42">Travel Itinerary Planner — LangGraph</text>
  <text class="subtitle" x="41" y="64">StateGraph · validate → 5 parallel pure-LLM analyses · weighted 4-way decision gate · interrupt() travel-agent HITL · SqliteSaver checkpointer · SQLite planning store</text>

  <!-- checkpointer store (right, near HITL) -->
  <g>
    <rect x="1055" y="678" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="678" x2="1055" y2="728" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="678" x2="1225" y2="728" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="728" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="678" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="702" text-anchor="middle" fill="#334155" font-size="12">SqliteSaver</text>
    <text class="ns" x="1140" y="717" text-anchor="middle" fill="#334155">checkpoints.db</text>
  </g>

  <!-- planning store (right, near report) -->
  <g>
    <rect x="1055" y="972" width="170" height="50" fill="#F1F5F9" stroke="none"/>
    <line x1="1055" y1="972" x2="1055" y2="1022" stroke="#475569" stroke-width="1.3"/>
    <line x1="1225" y1="972" x2="1225" y2="1022" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="1022" rx="85" ry="11" fill="#F1F5F9" stroke="#475569" stroke-width="1.3"/>
    <ellipse cx="1140" cy="972" rx="85" ry="11" fill="#E2E8F0" stroke="#475569" stroke-width="1.3"/>
    <text class="nt" x="1140" y="996" text-anchor="middle" fill="#334155" font-size="12">SQLite planning store</text>
    <text class="ns" x="1140" y="1011" text-anchor="middle" fill="#334155">plannings.db</text>
  </g>

  <!-- START -->
  <rect x="535" y="86" width="110" height="36" rx="18" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.4"/>
  <text class="nt" x="590" y="109" text-anchor="middle">START</text>

  <!-- validate -->
  <rect x="415" y="140" width="350" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="164" text-anchor="middle" font-size="12">validate</text>
  <text class="ns" x="590" y="182" text-anchor="middle">check REQUIRED_FIELDS on travel_request → errors if missing</text>

  <!-- parallel band -->
  <rect x="42" y="230" width="1096" height="176" rx="12" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1.3" stroke-dasharray="6 5"/>
  <text class="grp" x="58" y="250">parallel fan-out · add_edge(validate → 5) · pure-LLM · each node writes its own state key</text>

  <g>
    <rect x="51" y="262" width="206" height="138" rx="10" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.5"/>
    <text class="nt" x="154" y="287" text-anchor="middle">budget</text>
    <text class="ns" x="154" y="304" text-anchor="middle">BudgetAnalyzerAgent</text>
    <line x1="71" y1="317" x2="237" y2="317" stroke="#99F6E4"/>
    <text class="chip" x="154" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="154" y="360" text-anchor="middle" fill="#0F766E">→ budget_results</text>
    <text class="ns" x="154" y="378" text-anchor="middle" fill="#0F766E">(+ budget_feasible)</text>
  </g>
  <g>
    <rect x="269" y="262" width="206" height="138" rx="10" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.5"/>
    <text class="nt" x="372" y="287" text-anchor="middle">destination</text>
    <text class="ns" x="372" y="304" text-anchor="middle">DestinationMatcherAgent</text>
    <line x1="289" y1="317" x2="455" y2="317" stroke="#99F6E4"/>
    <text class="chip" x="372" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="372" y="360" text-anchor="middle" fill="#0F766E">→ destination_results</text>
    <text class="ns" x="372" y="378" text-anchor="middle" fill="#0F766E">(match_score)</text>
  </g>
  <g>
    <rect x="487" y="262" width="206" height="138" rx="10" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.5"/>
    <text class="nt" x="590" y="287" text-anchor="middle">activity</text>
    <text class="ns" x="590" y="304" text-anchor="middle">ActivityRecommenderAgent</text>
    <line x1="507" y1="317" x2="673" y2="317" stroke="#99F6E4"/>
    <text class="chip" x="590" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="590" y="360" text-anchor="middle" fill="#0F766E">→ activity_results</text>
    <text class="ns" x="590" y="378" text-anchor="middle" fill="#0F766E">(activity_score)</text>
  </g>
  <g>
    <rect x="705" y="262" width="206" height="138" rx="10" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.5"/>
    <text class="nt" x="808" y="287" text-anchor="middle">weather</text>
    <text class="ns" x="808" y="304" text-anchor="middle">WeatherSeasonAgent</text>
    <line x1="725" y1="317" x2="891" y2="317" stroke="#99F6E4"/>
    <text class="chip" x="808" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="808" y="360" text-anchor="middle" fill="#0F766E">→ weather_results</text>
    <text class="ns" x="808" y="378" text-anchor="middle" fill="#0F766E">(season_score)</text>
  </g>
  <g>
    <rect x="923" y="262" width="206" height="138" rx="10" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.5"/>
    <text class="nt" x="1026" y="287" text-anchor="middle">safety</text>
    <text class="ns" x="1026" y="304" text-anchor="middle">SafetyCheckerAgent</text>
    <line x1="943" y1="317" x2="1109" y2="317" stroke="#99F6E4"/>
    <text class="chip" x="1026" y="336" text-anchor="middle">LLM · scores 0–10</text>
    <text class="ns" x="1026" y="360" text-anchor="middle" fill="#0F766E">→ safety_results</text>
    <text class="ns" x="1026" y="378" text-anchor="middle" fill="#0F766E">(safety_score)</text>
  </g>

  <!-- coordinator (fan-in) -->
  <rect x="430" y="442" width="320" height="54" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.6"/>
  <text class="nt" x="590" y="465" text-anchor="middle" font-size="12">coordinator</text>
  <text class="ns" x="590" y="482" text-anchor="middle">weighted average of 5 dimensions → coordination_summary · overall_score</text>

  <!-- decision gate (4-way) -->
  <rect x="375" y="530" width="430" height="104" rx="10" fill="#FFFFFF" stroke="#0F766E" stroke-width="2.2"/>
  <text class="nt" x="590" y="552" text-anchor="middle" fill="#0F172A">◆ decision · add_conditional_edges</text>
  <text class="ns" x="590" y="572" text-anchor="middle">overall ≥ 8.0 · safety ≥ 7.0 · budget_feasible → RECOMMENDED</text>
  <text class="ns" x="590" y="590" text-anchor="middle">else not budget_feasible → BUDGET_ADJUST</text>
  <text class="ns" x="590" y="608" text-anchor="middle">else safety &lt; 7.0 · match &lt; 6.0 → ALTERNATIVE_DESTINATION</text>
  <text class="ns" x="590" y="626" text-anchor="middle">else → NOT_RECOMMENDED</text>

  <!-- agent_review (HITL node) -->
  <rect x="730" y="678" width="230" height="58" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.6"/>
  <text class="nt" x="845" y="702" text-anchor="middle" fill="#92400E" font-size="12">agent_review</text>
  <text class="ns" x="845" y="719" text-anchor="middle" fill="#92400E">interrupt() · pause on checkpointer</text>

  <!-- HITL band -->
  <rect x="560" y="770" width="475" height="162" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text class="grp" x="576" y="792" fill="#B45309">HUMAN-IN-THE-LOOP · interrupt() → Command(resume={"action": …})</text>
  <rect x="650" y="808" width="230" height="50" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5"/>
  <text class="nt" x="765" y="829" text-anchor="middle" fill="#0F172A" font-size="12">Travel-agent decision</text>
  <text class="ns" x="765" y="846" text-anchor="middle">approve / override → human_decision</text>
  <text class="ns" x="797" y="904" text-anchor="middle" fill="#B45309">approve → &lt;DECISION&gt;_confirmed · override → agent_override</text>

  <!-- report -->
  <rect x="420" y="968" width="340" height="58" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.8"/>
  <text class="nt" x="590" y="992" text-anchor="middle" font-size="12">report</text>
  <text class="ns" x="590" y="1010" text-anchor="middle">fold human_decision → final decision + report · workflow_complete</text>

  <!-- END -->
  <rect x="535" y="1066" width="110" height="36" rx="18" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.8"/>
  <text class="pill" x="590" y="1089" text-anchor="middle" fill="#166534">END</text>
  <text class="ns" x="660" y="1088" text-anchor="start" fill="#475569">report.decision · workflow_complete = True</text>

  <!-- ===== connectors ===== -->
  <path class="flow" d="M590 122 V140" marker-end="url(#arrow)"/>
  <rect x="600" y="122" width="196" height="14" fill="#FFFFFF"/>
  <text class="el" x="604" y="133" text-anchor="start">run_travel_planning(travel_request)</text>

  <!-- fan-out validate → 5 -->
  <path class="flow" d="M590 198 V216 H154 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H372 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H808 V262" marker-end="url(#arrow)"/>
  <path class="flow" d="M590 198 V216 H1026 V262" marker-end="url(#arrow)"/>

  <!-- fan-in 5 → coordinator -->
  <path class="flow" d="M154 400 V422 H590 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M372 400 V422 H590"/>
  <path class="flow" d="M590 400 V442" marker-end="url(#arrow)"/>
  <path class="flow" d="M808 400 V422 H590"/>
  <path class="flow" d="M1026 400 V422 H590"/>
  <rect x="470" y="415" width="240" height="14" fill="#FFFFFF"/>
  <text class="el" x="590" y="426" text-anchor="middle">fan-in: add_edge([5] → coordinator)</text>

  <path class="flow" d="M590 496 V530" marker-end="url(#arrow)"/>

  <!-- decision → report (RECOMMENDED) -->
  <path class="flow" d="M505 634 V968" marker-end="url(#arrow)"/>
  <rect x="447" y="650" width="116" height="15" fill="#FFFFFF"/>
  <text class="el" x="505" y="662" text-anchor="middle" fill="#047857">RECOMMENDED</text>

  <!-- decision → agent_review (non-RECOMMENDED) -->
  <path class="flow" d="M690 634 V656 H845 V678" marker-end="url(#arrow)"/>
  <rect x="694" y="648" width="196" height="15" fill="#FFFFFF"/>
  <text class="el" x="792" y="660" text-anchor="middle" fill="#B45309">route_after_decision → agent_review</text>

  <!-- agent_review → HITL band -->
  <path class="flow" d="M845 736 V770" marker-end="url(#arrow)"/>

  <!-- HITL resume → report -->
  <path class="flow" d="M620 932 V968" marker-end="url(#arrow)"/>
  <rect x="626" y="940" width="150" height="15" fill="#FFFBEB"/>
  <text class="el" x="632" y="952" text-anchor="start" fill="#B45309">resume → report</text>

  <!-- report → END -->
  <path class="flow" d="M590 1026 V1066" marker-end="url(#arrow)"/>

  <!-- report → planning store -->
  <path class="mem" d="M760 997 H1055" marker-end="url(#arrowMem)"/>
  <rect x="828" y="989" width="104" height="15" fill="#FFFFFF"/>
  <text class="el" x="880" y="1001" text-anchor="middle" fill="#0F766E">save_planning</text>

  <!-- agent_review → checkpointer -->
  <path class="mem" d="M960 705 H1055" marker-end="url(#arrowMem)"/>
  <rect x="968" y="697" width="106" height="15" fill="#FFFFFF"/>
  <text class="el" x="1021" y="709" text-anchor="middle" fill="#0F766E">durable checkpoint</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,1116)">
    <text class="grp" x="0" y="0" fill="#334155">Legend</text>
    <rect x="0" y="9" width="16" height="16" rx="3" fill="#F0FDFA" stroke="#0F766E"/>
    <text class="lg" x="22" y="22">pure-LLM agent node</text>
    <rect x="170" y="9" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="lg" x="192" y="22">deterministic node</text>
    <rect x="350" y="9" width="16" height="16" rx="3" fill="#FFFBEB" stroke="#D97706"/>
    <text class="lg" x="372" y="22">travel-agent HITL (interrupt)</text>
    <rect x="540" y="9" width="16" height="16" rx="3" fill="#ECFDF5" stroke="#16A34A"/>
    <text class="lg" x="562" y="22">END</text>
    <line class="mem" x1="620" y1="18" x2="660" y2="18" marker-end="url(#arrowMem)"/>
    <text class="lg" x="668" y="22">SQLite checkpointer / planning store I/O</text>
  </g>
</svg>
